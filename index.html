<body class="bg-slate-900 text-slate-300 font-sans select-none overflow-hidden fixed inset-0 flex flex-col">

<header class="bg-slate-800 p-3 flex justify-between items-center border-b border-slate-700 shrink-0 z-10 shadow-md">
  <div class="text-base font-bold text-white tracking-widest">📜 천기의 기록</div>
  <div class="flex gap-3 text-xs font-semibold">
    <span class="text-blue-300">💠 <span id="ui-skystone">0</span></span>
    <span class="text-green-300">📜 <span id="ui-manual">0</span></span>
    <span class="text-purple-400">🕯️ <span id="ui-legacy">0</span></span>
  </div>
</header>

<main id="main-content" class="flex-1 overflow-y-auto relative w-full flex flex-col items-center justify-center p-4">
  <button onclick="bootGame()" class="px-8 py-5 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl shadow-[0_0_20px_rgba(37,99,235,0.5)] active:scale-95 transition-transform text-lg animate-pulse">
    🚀 게임 엔진 강제 가동 (터치)
  </button>
  <p class="text-xs text-slate-500 mt-4">버튼을 눌러도 반응이 없다면 브라우저 캐시 문제입니다.</p>
</main>

<footer class="bg-slate-800 flex justify-around p-2 border-t border-slate-700 shrink-0 text-[11px] font-bold pb-safe z-10 shadow-lg">
  <button onclick="switchTab('barracks')" id="tab-barracks" class="flex-1 py-3 text-center rounded hover:bg-slate-700 transition-colors">⛺ 막사</button>
  <button onclick="switchTab('battle')" id="tab-battle" class="flex-1 py-3 text-center rounded hover:bg-slate-700 text-yellow-400 transition-colors">⚔️ 출정</button>
  <button onclick="switchTab('gacha')" id="tab-gacha" class="flex-1 py-3 text-center rounded hover:bg-slate-700 text-blue-400 transition-colors">🏮 등용</button>
  <button onclick="switchTab('codex')" id="tab-codex" class="flex-1 py-3 text-center rounded hover:bg-slate-700 text-emerald-400 transition-colors">📖 도감</button>
  <button onclick="switchTab('legacy')" id="tab-legacy" class="flex-1 py-3 text-center rounded hover:bg-slate-700 text-purple-400 transition-colors">🏛️ 가문</button>
</footer>

<div id="gacha-fx" class="hidden fixed inset-0 z-[60] flex flex-col items-center justify-center pointer-events-none"><h1 id="fx-text" class="tracking-widest"></h1></div>

<div id="modal-gacha" class="hidden fixed inset-0 z-50 bg-black/95 flex flex-col items-center justify-center p-4 backdrop-blur-md">

</div>

<div id="modal-char-info" class="hidden fixed inset-0 z-[70] bg-black/90 flex flex-col items-center justify-center p-4 backdrop-blur-md transition-opacity">

function getImgUrl(seed) { return `https://api.dicebear.com/9.x/adventurer/svg?seed=${seed}&backgroundColor=0f172a`; }

function bootGame() {
  try {
    updateUI();
    switchTab('gacha');
  } catch(e) {
    alert("엔진 가동 실패: " + e.message);
  }
}

function updateUI() {
  document.getElementById('ui-skystone').innerText = state.player.resources.skyStones.toLocaleString();
  document.getElementById('ui-manual').innerText = state.player.resources.tacticsManuals.toLocaleString();
  document.getElementById('ui-legacy').innerText = state.player.resources.legacyPoints.toLocaleString();
}

function switchTab(tab) {
  state.activeTab = tab;
  if(state.battle.timer) clearInterval(state.battle.timer);

  ['barracks', 'battle', 'gacha', 'codex', 'legacy'].forEach(t => {
    let btn = document.getElementById('tab-' + t);
    if(btn) btn.classList.remove('bg-slate-700');
  });
  let activeBtn = document.getElementById('tab-' + tab);
  if(activeBtn) activeBtn.classList.add('bg-slate-700');

  var main = document.getElementById('main-content');
  if(!main) return;
  main.className = (tab === 'battle') ? "flex-1 overflow-hidden relative w-full flex flex-col" : "flex-1 overflow-y-auto p-4 relative w-full flex flex-col";

  if (tab === 'gacha') renderGacha(main);
  else if (tab === 'barracks') renderBarracks(main);
  else if (tab === 'battle') initBattle(main);
  else if (tab === 'codex') renderCodex(main);
  else main.innerHTML = '<div class="flex items-center justify-center h-full text-slate-500">준비 중입니다.</div>';
}

function renderGacha(container) {
  container.innerHTML = `<div class="text-center mt-6 mb-8">
    <h2 class="text-3xl font-bold text-blue-400 mb-2 drop-shadow-md">🏮 천기 등용문</h2>
    <p class="text-xs text-slate-400">0.05%의 기적, 신화 무장을 소환하세요.</p>
  </div>
  <div class="flex flex-col gap-5 max-w-xs mx-auto mt-10">
    <button onclick="doGacha(1)" class="w-full py-4 bg-slate-800 border-2 border-blue-500/30 rounded-xl font-bold text-white shadow-lg active:scale-95 transition-transform">1회 소환 <span class="text-sky-300 text-xs ml-2">💠 100</span></button>
    <button onclick="doGacha(10)" class="w-full py-5 bg-slate-800 border-2 border-amber-500/50 rounded-xl font-bold text-lg text-white shadow-[0_0_15px_rgba(245,158,11,0.2)] active:scale-95 transition-transform">10회 소환 <span class="text-amber-300 text-sm ml-2">💠 1,000</span></button>
  </div>`;
}

function doGacha(times) {
  var cost = times * 100;
  if(state.player.resources.skyStones < cost) return alert("천운석이 부족합니다!");
  state.player.resources.skyStones -= cost;

  var results = [];
  var highestGrade = 'N';

  for(var i=0; i<times; i++) {
    var roll = Math.random() * 100;
    var grade = roll < 0.05 ? 'UR' : (roll < 1.05 ? 'SSR' : (roll < 11.05 ? 'SR' : (roll < 51.05 ? 'R' : 'N')));
    if(grade === 'UR') highestGrade = 'UR';
    else if(grade === 'SSR' && highestGrade !== 'UR') highestGrade = 'SSR';

    var pool = HERO_DB.filter(h => h.grade === grade);
    if(pool.length === 0) pool = HERO_DB.filter(h => h.grade === 'N');
    var hero = pool[Math.floor(Math.random() * pool.length)];

    var existing = state.player.roster.find(r => r.id === hero.id);
    if(existing) {
      existing.count++;
      results.push({...hero, isDup: true, count: existing.count});
    } else {
      state.player.roster.push({id: hero.id, count: 1});
      results.push({...hero, isDup: false, count: 1});
    }
  }
  updateUI();
  if(highestGrade === 'UR' || highestGrade === 'SSR') playGachaFX(highestGrade, results);
  else showGachaResults(results);
}

function playGachaFX(grade, results) {
  var fxScreen = document.getElementById('gacha-fx');
  var fxText = document.getElementById('fx-text');
  fxScreen.classList.remove('hidden');
  if(grade === 'UR') {
    fxScreen.className = 'fixed inset-0 z-[60] flex flex-col items-center justify-center pointer-events-none fx-ur';
    fxText.innerHTML = '<span class="text-red-500 drop-shadow-[0_0_20px_#ef4444] text-4xl font-black">천기가 요동칩니다...!!</span>';
  } else {
    fxScreen.className = 'fixed inset-0 z-[60] flex flex-col items-center justify-center pointer-events-none fx-ssr';
    fxText.innerHTML = '<span class="text-amber-400 drop-shadow-[0_0_15px_#f59e0b] text-3xl font-bold">영웅의 기운이 느껴집니다!</span>';
  }
  setTimeout(() => {
    fxScreen.classList.add('hidden');
    showGachaResults(results);
  }, 2500);
}

function showGachaResults(results) {
  var html = '';
  results.forEach(r => {
    var border = r.grade === 'UR' ? 'border-red-500 bg-red-900/30' : (r.grade === 'SSR' ? 'border-amber-500 bg-amber-900/30' : 'border-slate-700 bg-slate-800');
    var txt = r.isDup ? '<div class="text-[9px] mt-1 text-amber-400 font-bold">✨ 돌파 조각</div>' : '<div class="text-[10px] mt-1 text-green-400 font-bold">NEW!</div>';
    var attrChar = attrMap[r.attr] || '無';
    html += `<div class="border ${border} p-3 rounded-xl text-center shadow-lg relative overflow-hidden flex flex-col items-center">
      <span class="absolute top-1 left-1 text-[10px] bg-black/50 px-1 rounded attr-${attrChar}">${attrChar}</span>
      <div class="text-[10px] text-slate-400 mb-1 absolute top-1 right-1">${r.isDup ? r.count - 1 + ' 돌파' : ''}</div>
      <img src="${getImgUrl(r.id)}" class="w-14 h-14 rounded-full border border-slate-600 mb-2 mt-2 bg-slate-900 shadow-inner">
      <div class="font-bold text-sm grade-${r.grade}">${r.name}</div>
      <div class="text-[9px] text-slate-400">${r.role}</div>
      ${txt}
    </div>`;
  });
  document.getElementById('gacha-result-list').innerHTML = html;
  document.getElementById('modal-gacha').classList.remove('hidden');
}

}

function removeFromPartyByHero(id) {

  if(idx !== -1) { state.player.party[idx] = null; renderBarracks(document.getElementById('main-content')); }

  </div>
  <div class="grid grid-cols-4 gap-3 pb-10">`;

  var order = {'UR':5, 'SSR':4, 'SR':3, 'R':2, 'N':1};
  var sortedDB = [...HERO_DB].sort((a,b) => (order[b.grade]||0) - (order[a.grade]||0) || a.id.localeCompare(b.id));

  sortedDB.forEach(h => {
    var isOwned = state.player.roster.some(r => r.id === h.id);
    var attrChar = attrMap[h.attr] || '無';
    html += `<div onclick="openCharModal('${h.id}')" class="flex flex-col items-center cursor-pointer transition-transform active:scale-95 ${isOwned ? '' : 'opacity-30 grayscale'}">
      <div class="relative mb-1">
        <img src="${getImgUrl(h.id)}" class="w-14 h-14 rounded-full border-2 ${isOwned ? 'border-sky-500' : 'border-slate-600'} bg-slate-800 shadow-md">
        <span class="absolute -top-1 -right-1 text-[8px] attr-${attrChar} bg-black/80 px-1 rounded-full border border-slate-600">${attrChar}</span>
      </div>
      <div class="text-[9px] mb-0.5 grade-${h.grade} border border-slate-700 px-1 rounded bg-slate-900 flex items-center gap-1">
        <span>${h.grade}</span><span class="text-slate-400 text-[8px] ml-0.5 border-l border-slate-600 pl-1">${h.role}</span>
      </div>
      <div class="text-[10px] font-bold text-center w-full truncate ${isOwned ? 'text-slate-300' : 'text-slate-500'}">${isOwned ? h.name : '미확인'}</div>
    </div>`;
  });
  container.innerHTML = html + '</div>';
}

function openCharModal(id) {
  var h = HERO_DB.find(x => x.id === id);
  if(!h) return;
  var rosterData = state.player.roster.find(r => r.id === h.id);
  var isOwned = !!rosterData;
  var attrChar = attrMap[h.attr] || '無';
  var statTotal = h.stats.str + h.stats.int + h.stats.con + h.stats.spd;
  var lockedDiv = '<div class="absolute inset-0 bg-slate-900/80 backdrop-blur-[2px] z-10 flex items-center justify-center text-sm font-bold text-slate-500 border border-slate-700">정보 잠김</div>';

  var html = `<div class="relative mb-4 mt-2">
    <img src="${getImgUrl(h.id)}" class="w-24 h-24 rounded-full border-4 ${isOwned ? 'border-sky-400' : 'border-slate-600 grayscale'} bg-slate-900 shadow-xl">
    <span class="absolute -bottom-2 right-0 text-sm attr-${attrChar} bg-black/80 px-2 py-0.5 rounded-full border border-slate-600">${attrChar}</span>
  </div>
  <div class="text-center mb-4 w-full">
    <div class="flex justify-center items-center gap-2 mb-1">
      <span class="text-[10px] grade-${h.grade} border border-slate-600 px-2 rounded-full bg-slate-900">${h.grade}</span>
      <span class="text-[10px] text-slate-400 border border-slate-600 px-2 rounded-full bg-slate-900">${h.role}</span>
      ${isOwned && rosterData.count > 1 ? `<span class="text-[10px] text-amber-400 border border-amber-600/50 px-2 rounded-full bg-amber-900/30">+${rosterData.count - 1} 돌파</span>` : ''}
    </div>
    <div class="text-2xl font-bold ${isOwned ? 'text-white' : 'text-slate-500'} mb-1">${isOwned ? h.name : '미확인 무장'}</div>
    ${isOwned ? `<div class="text-[10px] text-amber-400">총합 전투력: ${statTotal}</div>` : '<div class="text-[10px] text-slate-500">등용 시 정보가 개방됩니다.</div>'}
  </div>

  <div class="w-full bg-slate-900 rounded-xl p-3 mb-3 border border-slate-700 relative overflow-hidden">
    ${!isOwned ? lockedDiv : ''}
    <div class="text-xs text-amber-400 mb-2 font-bold flex items-center gap-1"><span>📊</span> 기초 스탯</div>
    <div class="grid grid-cols-2 gap-y-2 gap-x-4 text-xs">
      <div class="flex items-center justify-between"><span class="text-slate-400">무력</span><div class="w-16 bg-slate-800 h-1.5 rounded overflow-hidden"><div class="bg-red-400 h-full" style="width:${(h.stats.str/120)*100}%"></div></div><span class="font-bold text-red-400 w-6 text-right">${h.stats.str}</span></div>
      <div class="flex items-center justify-between"><span class="text-slate-400">지력</span><div class="w-16 bg-slate-800 h-1.5 rounded overflow-hidden"><div class="bg-blue-400 h-full" style="width:${(h.stats.int/120)*100}%"></div></div><span class="font-bold text-blue-400 w-6 text-right">${h.stats.int}</span></div>
      <div class="flex items-center justify-between"><span class="text-slate-400">통솔</span><div class="w-16 bg-slate-800 h-1.5 rounded overflow-hidden"><div class="bg-green-400 h-full" style="width:${(h.stats.con/120)*100}%"></div></div><span class="font-bold text-green-400 w-6 text-right">${h.stats.con}</span></div>
      <div class="flex items-center justify-between"><span class="text-slate-400">민첩</span><div class="w-16 bg-slate-800 h-1.5 rounded overflow-hidden"><div class="bg-sky-400 h-full" style="width:${(h.stats.spd/120)*100}%"></div></div><span class="font-bold text-sky-400 w-6 text-right">${h.stats.spd}</span></div>
    </div>
  </div>

  <div class="w-full bg-slate-900 rounded-xl p-3 mb-3 border border-slate-700 relative">
    ${!isOwned ? lockedDiv : ''}
    <div class="text-xs text-amber-400 mb-1 font-bold flex items-center gap-1"><span>⚔️</span> 액티브 스킬: <span class="text-white ml-1">${h.activeSkill ? h.activeSkill.name : '없음'}</span></div>
    <div class="text-[11px] text-slate-300 leading-relaxed pl-3 border-l-2 border-slate-600 mt-1 mb-3">${h.activeSkill ? h.activeSkill.desc : '-'}</div>
    <div class="text-xs text-emerald-400 mb-1 font-bold flex items-center gap-1"><span>🛡️</span> 패시브 스킬: <span class="text-white ml-1">${h.passiveSkill ? h.passiveSkill.name : '없음'}</span></div>
    <div class="text-[11px] text-slate-300 leading-relaxed pl-3 border-l-2 border-slate-600 mt-1">${h.passiveSkill ? h.passiveSkill.desc : '-'}</div>
  </div>

  <div class="w-full bg-slate-900 rounded-xl p-3 border border-slate-700 relative">
    ${!isOwned ? lockedDiv : ''}
    <div class="text-xs text-amber-400 mb-1 font-bold flex items-center gap-1"><span>🔗</span> 운명의 인연</div>
    <div class="text-[11px] text-slate-400 pl-3 border-l-2 border-slate-600 mt-2">${h.bonds || '인연 없음'}</div>
  </div>`;

  document.getElementById('char-modal-content').innerHTML = html;
  document.getElementById('modal-char-info').classList.remove('hidden');
}

function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

function initBattle(container) {
  var hasHero = state.player.party.some(id => id !== null);
  if (!hasHero) { container.innerHTML = '<div class="text-center pt-20 text-slate-400">출전할 무장이 없습니다.<br>막사에서 파티를 편성해주세요.</div>'; return; }
  state.battle.logs = ["전투가 시작되었습니다!"];
  state.battle.ally = state.player.party.map((id, idx) => {
    if (!id) return null;
    var d = HERO_DB.find(h => h.id === id);
    return {...d, hp: d.stats.con * 50, maxHp: d.stats.con * 50, atb: 0, pos: idx, side: 'ally' };
  }).filter(u => u !== null);

  state.battle.enemy = [
    { id: 'E1', name: '황건적 대장', grade: 'R', role: '맹장', attr: '지', stats: { str: 45, int: 20, con: 50, spd: 40 }, side: 'enemy' },
    { id: 'E2', name: '황건적 졸개', grade: 'N', role: '맹장', attr: '지', stats: { str: 30, int: 10, con: 30, spd: 30 }, side: 'enemy' }
  ].map(e => ({...e, hp: e.stats.con * 50, maxHp: e.stats.con * 50, atb: 0 }));

  renderBattleScreen(container);
  state.battle.timer = setInterval(battleTick, 100);
}

function battleTick() {
  var allUnits = state.battle.ally.concat(state.battle.enemy);
  var allyAlive = state.battle.ally.filter(u => u.hp > 0).length;
  var enemyAlive = state.battle.enemy.filter(u => u.hp > 0).length;
  if(allyAlive === 0 || enemyAlive === 0) {
    clearInterval(state.battle.timer);
    addLog(allyAlive === 0 ? "패배했습니다..." : "✨ 전투 승리! 전리품을 획득했습니다!");
    updateBattleUI(); return;
  }
  allUnits.forEach(u => { if (u.hp > 0) u.atb += u.stats.spd * 0.5; });
  var activeUnit = allUnits.find(u => u.atb >= 1000);
  if (activeUnit) { executeTurn(activeUnit); activeUnit.atb = 0; }
  updateBattleUI();
}

function executeTurn(unit) {
  var targets = unit.side === 'ally' ? state.battle.enemy : state.battle.ally;
  var aliveTargets = targets.filter(t => t.hp > 0);
  if (aliveTargets.length === 0) return;
  var target = aliveTargets[Math.floor(Math.random() * aliveTargets.length)];
  var baseDmg = unit.stats.str * 5;
  var miti = 100 / (100 + (target.stats.con * 2));
  var attrBonus = 1.0;
  if ((unit.attr === '천' && target.attr === '지') || (unit.attr === '지' && target.attr === '인') || (unit.attr === '인' && target.attr === '천')) attrBonus = 1.3;
  var finalDmg = Math.max(1, Math.floor(baseDmg * miti * attrBonus));
  target.hp = Math.max(0, target.hp - finalDmg);
  addLog(`<span class='grade-${unit.grade} font-bold'>${unit.name}</span>이(가) <span class='grade-${target.grade} font-bold'>${target.name}</span>에게 <span class='text-red-400 font-bold'>${finalDmg}</span> 피해!` + (attrBonus > 1.0 ? " <span class='text-[9px] text-amber-400'>(상성 우위!)</span>" : ""));
}

function addLog(msg) {
  state.battle.logs.unshift(msg)
  if (state.battle.logs.length > 50) state.battle.logs.pop();
  var logEl = document.getElementById('battle-logs');
  if (logEl) logEl.innerHTML = state.battle.logs.map((l, i) => `<div class="mb-1 pb-1 border-b border-slate-800/50 ${i===0?'opacity-100 font-bold text-white':(i<3?'opacity-80':'opacity-40 text-[10px]')}">${l}</div>`).join('');
}

function renderBattleScreen(container) {
  container.innerHTML = `<div class="flex-1 flex flex-col p-2 h-full">
    <div id="enemy-area" class="flex justify-around items-end h-[35%] pb-2"></div>
    <div id="battle-logs" class="flex-1 bg-black/60 rounded-xl p-3 overflow-y-auto text-[11px] text-slate-300 border border-slate-700/50 shadow-inner my-2 custom-scrollbar"></div>
    <div id="ally-area" class="flex justify-around items-start h-[35%] pt-2"></div>
  </div>`;
  updateBattleUI();
}

function updateBattleUI() {
  var enemyArea = document.getElementById('enemy-area');
  var allyArea = document.getElementById('ally-area');
  if (!enemyArea || !allyArea) return;
  var unitHtml = (u) => {
    var isDead = u.hp <= 0;
    return `<div class="flex flex-col items-center w-[4.5rem] transition-opacity ${isDead ? 'opacity-30 grayscale' : ''}">
      <div class="relative"><img src="${getImgUrl(u.id)}" class="w-12 h-12 rounded-full border-2 ${u.side==='ally'?'border-sky-500':'border-red-500'} bg-slate-900 shadow-lg mb-1"><span class="absolute -top-1 -right-1 text-[8px] attr-${attrMap[u.attr]} bg-black/80 px-1 rounded-full border border-slate-600">${attrMap[u.attr]}</span></div>
      <div class="text-[9px] mb-1 font-bold grade-${u.grade}">${u.name}</div>
      <div class="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden mb-1 border border-slate-700"><div class="hp-bar bg-red-500 h-full" style="width:${(u.hp / u.maxHp) * 100}%"></div></div>
      <div class="w-full bg-slate-900 h-1 rounded-full overflow-hidden border border-slate-700"><div class="bg-sky-400 h-full" style="width: ${Math.min(100, (u.atb / 1000) * 100)}%"></div></div>
    </div>`;
  };
  enemyArea.innerHTML = state.battle.enemy.map(unitHtml).join('');
  allyArea.innerHTML = state.battle.ally.map(unitHtml).join('');
}
</script>
</body>
</html>
