function getImgUrl(seed) { return `https://api.dicebear.com/9.x/adventurer/svg?seed=${seed}&backgroundColor=0f172a`; }

function bootGame() {
  try {
    updateUI();
    switchTab('gacha');
  } catch(e) {
    alert("엔진 가동 실패: " + e.message);
  }
}

function updateUI() {
  document.getElementById('ui-skystone').innerText = state.player.resources.skyStones.toLocaleString();
  document.getElementById('ui-manual').innerText = state.player.resources.tacticsManuals.toLocaleString();
  document.getElementById('ui-legacy').innerText = state.player.resources.legacyPoints.toLocaleString();
}

function switchTab(tab) {
  state.activeTab = tab;
  if(state.battle.timer) clearInterval(state.battle.timer);

  ['barracks', 'battle', 'gacha', 'codex', 'legacy'].forEach(t => {
    let btn = document.getElementById('tab-' + t);
    if(btn) btn.classList.remove('bg-slate-700');
  });
  let activeBtn = document.getElementById('tab-' + tab);
  if(activeBtn) activeBtn.classList.add('bg-slate-700');

  var main = document.getElementById('main-content');
  if(!main) return;
  main.className = (tab === 'battle') ? "flex-1 overflow-hidden relative w-full flex flex-col bg-slate-900" : "flex-1 overflow-y-auto p-4 relative w-full flex flex-col bg-slate-900";

  if (tab === 'gacha') renderGacha(main);
  else if (tab === 'barracks') renderBarracks(main);
  else if (tab === 'battle') initBattle(main);
  else if (tab === 'codex') renderCodex(main);
  else main.innerHTML = '<div class="flex items-center justify-center h-full text-slate-500">준비 중입니다.</div>';
}

function renderGacha(container) {
  container.innerHTML = `<div class="text-center mt-6 mb-8">
    <h2 class="text-3xl font-bold text-blue-400 mb-2 drop-shadow-md">🏮 천기 등용문</h2>
    <p class="text-xs text-slate-400">0.05%의 기적, 신화 무장을 소환하세요.</p>
  </div>
  <div class="flex flex-col gap-5 max-w-xs mx-auto mt-10">
    <button onclick="doGacha(1)" class="w-full py-4 bg-slate-800 border-2 border-blue-500/30 rounded-xl font-bold text-white shadow-lg active:scale-95 transition-transform">1회 소환 <span class="text-sky-300 text-xs ml-2">💠 100</span></button>
    <button onclick="doGacha(10)" class="w-full py-5 bg-slate-800 border-2 border-amber-500/50 rounded-xl font-bold text-lg text-white shadow-[0_0_15px_rgba(245,158,11,0.2)] active:scale-95 transition-transform">10회 소환 <span class="text-amber-300 text-sm ml-2">💠 1,000</span></button>
  </div>`;
}

function doGacha(times) {
  var cost = times * 100;
  if(state.player.resources.skyStones < cost) return alert("천운석이 부족합니다!");
  state.player.resources.skyStones -= cost;

  var results = [];
  var highestGrade = 'N';

  for(var i=0; i<times; i++) {
    var roll = Math.random() * 100;
    var grade = roll < 0.05 ? 'UR' : (roll < 1.05 ? 'SSR' : (roll < 11.05 ? 'SR' : (roll < 51.05 ? 'R' : 'N')));
    if(grade === 'UR') highestGrade = 'UR';
    else if(grade === 'SSR' && highestGrade !== 'UR') highestGrade = 'SSR';

    var pool = HERO_DB.filter(h => h.grade === grade);
    if(pool.length === 0) pool = HERO_DB.filter(h => h.grade === 'N');
    var hero = pool[Math.floor(Math.random() * pool.length)];

    var existing = state.player.roster.find(r => r.id === hero.id);
    if(existing) {
      existing.count++;
      results.push({...hero, isDup: true, count: existing.count});
    } else {
      state.player.roster.push({id: hero.id, count: 1});
      results.push({...hero, isDup: false, count: 1});
    }
  }
  updateUI();
  if(highestGrade === 'UR' || highestGrade === 'SSR') playGachaFX(highestGrade, results);
  else showGachaResults(results);
}

function playGachaFX(grade, results) {
  var fxScreen = document.getElementById('gacha-fx');
  var fxText = document.getElementById('fx-text');
  fxScreen.classList.remove('hidden');
  if(grade === 'UR') {
    fxScreen.className = 'fixed inset-0 z-[60] flex flex-col items-center justify-center pointer-events-none fx-ur';
    fxText.innerHTML = '<span class="text-red-500 drop-shadow-[0_0_20px_#ef4444] text-4xl font-black">천기가 요동칩니다...!!</span>';
  } else {
    fxScreen.className = 'fixed inset-0 z-[60] flex flex-col items-center justify-center pointer-events-none fx-ssr';
    fxText.innerHTML = '<span class="text-amber-400 drop-shadow-[0_0_15px_#f59e0b] text-3xl font-bold">영웅의 기운이 느껴집니다!</span>';
  }
  setTimeout(() => {
    fxScreen.classList.add('hidden');
    showGachaResults(results);
  }, 2500);
}

function showGachaResults(results) {
  var html = '';
  results.forEach(r => {
    var border = r.grade === 'UR' ? 'border-red-500 bg-red-900/30' : (r.grade === 'SSR' ? 'border-amber-500 bg-amber-900/30' : 'border-slate-700 bg-slate-800');
    var txt = r.isDup ? '<div class="text-[9px] mt-1 text-amber-400 font-bold">✨ 돌파 조각</div>' : '<div class="text-[10px] mt-1 text-green-400 font-bold">NEW!</div>';
    var attrChar = attrMap[r.attr] || '無';
    html += `<div class="border ${border} p-3 rounded-xl text-center shadow-lg relative overflow-hidden flex flex-col items-center">
      <span class="absolute top-1 left-1 text-[10px] bg-black/50 px-1 rounded attr-${attrChar}">${attrChar}</span>
      <div class="text-[10px] text-slate-400 mb-1 absolute top-1 right-1">${r.isDup ? (r.count - 1) + ' 돌파' : ''}</div>
      <img src="${getImgUrl(r.id)}" class="w-14 h-14 rounded-full border border-slate-600 mb-2 mt-2 bg-slate-900 shadow-inner">
      <div class="font-bold text-sm grade-${r.grade}">${r.name}</div>
      ${txt}
    </div>`;
  });
  document.getElementById('gacha-result-list').innerHTML = html;
  document.getElementById('modal-gacha').classList.remove('hidden');
}

// =============== [텍스트 파싱 기반 상태이상/패시브 통합 엔진] ===============

function getUnitStats(u) {
  var isMagic = (u.role === '모사' || u.role === '힐러');
  var baseAtk = isMagic ? u.stats.int * 5 : u.stats.str * 5;
  var baseDef = u.stats.con * 2; // 물리 방어력
  var baseMdef = (u.stats.con * 1) + (u.stats.int * 1.5); // 마법 방어력 (지력 비례)
  var baseSpd = u.stats.spd;
  
  // --- 패시브 스킬 효과 적용 ---
  if (u.passiveSkill) {
    var pDesc = u.passiveSkill.desc;
    if (pDesc.includes('공격력')) {
      var m = pDesc.match(/공격력\s*(\d+)%/);
      if (m) baseAtk *= (1 + parseInt(m[1])/100);
    }
    if (pDesc.includes('방어력')) {
      var m = pDesc.match(/방어력\s*(\d+)%/);
      if (m) {
        baseDef *= (1 + parseInt(m[1])/100);
        baseMdef *= (1 + parseInt(m[1])/100); // 범용 방어는 마방도 올려줌
      }
    }
    if (pDesc.includes('속도')) {
      var m = pDesc.match(/속도\s*(\d+)%/);
      if (m) baseSpd *= (1 + parseInt(m[1])/100);
    }
    if (pDesc.includes('지력')) { baseAtk *= 1.1; baseMdef *= 1.1; } // 지력업은 마방업
    if (pDesc.includes('무력')) { baseAtk *= 1.1; }
  }

  var atkB = 0, defB = 0, spdB = 0;
  u.buffs.forEach(b => {
    if(b.type === 'atk') atkB += b.amount;
    if(b.type === 'def') defB += b.amount;
    if(b.type === 'spd') spdB += b.amount;
  });

  return {
    atk: Math.floor(baseAtk * (1 + atkB)),
    def: Math.floor(baseDef * (1 + defB)),
    mdef: Math.floor(baseMdef * (1 + defB)),
    spd: Math.floor(baseSpd * (1 + spdB)),
    atkBonus: atkB, defBonus: defB, spdBonus: spdB,
    isMagic: isMagic // 직업 평타 타입 판별용
  };
}


function initBattle(container) {
  var hasHero = state.player.party.some(id => id !== null);
  if (!hasHero) { container.innerHTML = '<div class="text-center pt-20 text-slate-400">출전할 무장이 없습니다.<br>막사에서 파티를 편성해주세요.</div>'; return; }
  state.battle.logs = ["전투가 시작되었습니다!"];
  
  state.battle.ally = state.player.party.map((id, idx) => {
    if (!id) return null;
    var d = HERO_DB.find(h => h.id === id);
    if(!d) return null;
    return {...d, hp: d.stats.con * 50, maxHp: d.stats.con * 50, atb: 0, pos: idx, side: 'ally', buffs: [], cd: 0 };
  }).filter(u => u !== null);

  state.battle.enemy = [
    { id: 'E1', name: '황건적 대장', grade: 'R', role: '맹장', attr: '지', stats: { str: 45, int: 20, con: 50, spd: 40 }, side: 'enemy' },
    { id: 'E2', name: '황건적 졸개', grade: 'N', role: '맹장', attr: '지', stats: { str: 30, int: 10, con: 30, spd: 30 }, side: 'enemy' }
  ].map(e => ({...e, hp: e.stats.con * 50, maxHp: e.stats.con * 50, atb: 0, buffs: [], cd: 0 }));

  renderBattleScreen(container);
  state.battle.timer = setInterval(battleTick, 100);
}

function processStartOfTurn(unit) {
  // 지속 힐 (Elain 패시브 등)
  var allyTeam = unit.side === 'ally' ? state.battle.ally : state.battle.enemy;
  if(allyTeam.some(a => a.id === 'H003' && a.hp > 0)) {
     unit.hp = Math.min(unit.maxHp, unit.hp + unit.maxHp * 0.05); // 정령의 가호
  }

  // 중독, 화상, 출혈 도트 데미지 처리
  unit.buffs.forEach(b => {
    if(b.type === 'burn' || b.type === 'poison' || b.type === 'bleed') {
      var dmg = unit.maxHp * 0.05;
      unit.hp -= dmg;
      var effectName = b.type === 'burn' ? '화상' : (b.type === 'poison' ? '중독' : '출혈');
      var color = b.type === 'burn' ? 'text-orange-400' : (b.type === 'poison' ? 'text-purple-400' : 'text-red-600');
      addLog(`<span class='${color} font-bold'>${unit.name}이(가) ${effectName}으로 ${Math.floor(dmg)} 피해!</span>`);
    }
    if(b.type === 'regen') { unit.hp = Math.min(unit.maxHp, unit.hp + unit.maxHp * b.val); }
  });
}

function battleTick() {
  try {
    var allUnits = state.battle.ally.concat(state.battle.enemy);
    var allyAlive = state.battle.ally.filter(u => u.hp > 0);
    var enemyAlive = state.battle.enemy.filter(u => u.hp > 0);
    
    if(allyAlive.length === 0 || enemyAlive.length === 0) {
      clearInterval(state.battle.timer);
      addLog(allyAlive.length === 0 ? "<span class='text-red-500 font-bold'>패배했습니다...</span>" : "<span class='text-amber-400 font-bold'>✨ 전투 승리! 전리품을 획득했습니다!</span>");
      updateBattleUI(); return;
    }

    allUnits.forEach(u => { 
      if (u.hp > 0) u.atb += getUnitStats(u).spd * 0.5; 
    });

    var activeUnit = allUnits.find(u => u.atb >= 1000);
    if (activeUnit) { 
      processStartOfTurn(activeUnit);
      if(activeUnit.hp > 0) executeTurn(activeUnit); 
      activeUnit.atb = 0; 
      
      activeUnit.buffs.forEach(b => b.turns--);
      activeUnit.buffs = activeUnit.buffs.filter(b => b.turns > 0);
      if(activeUnit.cd > 0) activeUnit.cd--;
    }
    updateBattleUI();
  } catch(e) {
    console.error("Battle Tick Error", e);
    clearInterval(state.battle.timer);
  }
}

function executeTurn(unit) {
  if (unit.buffs.some(b => b.type === 'stun')) {
    addLog(`<span class='grade-${unit.grade}'>${unit.name}</span>은(는) 기절하여 행동하지 못합니다.`);
    return;
  }

  // 매혹 & 혼란 (CC기)
  var isCharmed = unit.buffs.some(b => b.type === 'charm');
  var isConfused = unit.buffs.some(b => b.type === 'confusion');
  if (isCharmed || isConfused) {
     var targets = [];
     if (isCharmed) {
         targets = unit.side === 'ally' ? state.battle.ally : state.battle.enemy;
         addLog(`<span class='text-pink-400'>${unit.name}이(가) 매혹되어 아군을 공격합니다!</span>`);
     } else {
         targets = state.battle.ally.concat(state.battle.enemy).filter(u => u.hp > 0 && u !== unit);
         addLog(`<span class='text-yellow-400'>${unit.name}이(가) 혼란에 빠져 무작위로 공격합니다!</span>`);
     }
     var t = targets.filter(x => x.hp > 0 && x !== unit);
     if(t.length > 0) dealDamage(unit, t[Math.floor(Math.random() * t.length)], 1.0);
     return; // 스킬 캔슬, 평타만 사용
  }

  var skill = unit.activeSkill || unit.skill;
  var prob = skill ? (skill.prob || 30) : 30;
  
  if (unit.cd <= 0 && Math.random() * 100 < prob) {
    executeSkill(unit);
    unit.cd = skill ? (skill.cd || 3) : 3;
  } else {
    executeAttack(unit);
  }
}

function getValidTarget(unit, targets) {
  var aliveTargets = targets.filter(t => t.hp > 0);
  if (aliveTargets.length === 0) return null;
  // 도발 체크
  var tauntTarget = aliveTargets.find(t => t.buffs.some(b => b.type === 'taunt'));
  if (tauntTarget) return tauntTarget;
  return aliveTargets[Math.floor(Math.random() * aliveTargets.length)];
}

function dealDamage(attacker, target, multiplier, dmgType = 'physical') {
  if (!target || target.hp <= 0) return;
  
  var atkStats = getUnitStats(attacker);
  var defStats = getUnitStats(target);
  
  var baseDmg = atkStats.atk * multiplier;
  
  // 패시브 효과 (상태이상 추가 데미지 등)
  if (attacker.passiveSkill) {
     var pDesc = attacker.passiveSkill.desc;
     if (pDesc.includes('화상') && target.buffs.some(b => b.type === 'burn')) baseDmg *= 1.3;
     if (pDesc.includes('중독') && target.buffs.some(b => b.type === 'poison')) baseDmg *= 1.2;
     if (pDesc.includes('체력이 낮을수록')) {
         var hpRatio = attacker.hp / attacker.maxHp;
         if(hpRatio <= 0.3) baseDmg *= 1.5;
         else if(hpRatio <= 0.6) baseDmg *= 1.2;
     }
  }

  // ★ 핵심: 데미지 타입에 따른 방어력 적용 분기
  var targetDef = (dmgType === 'magic') ? defStats.mdef : defStats.def;
  var miti = 100 / (100 + targetDef);
  
  var attrBonus = 1.0;
  if ((attacker.attr === '천' && target.attr === '지') || (attacker.attr === '지' && target.attr === '인') || (attacker.attr === '인' && target.attr === '천')) {
    attrBonus = 1.3;
  }

  var finalDmg = Math.max(1, Math.floor(baseDmg * miti * attrBonus));
  target.hp = Math.max(0, target.hp - finalDmg);
  
  // 전투 로그에 마법/물리 표시 추가
  var typeStr = dmgType === 'magic' ? "<span class='text-blue-300'>마법</span>" : "<span class='text-red-300'>물리</span>";
  addLog(`<span class='grade-${attacker.grade} font-bold'>${attacker.name}</span>이(가) <span class='grade-${target.grade} font-bold'>${target.name}</span>에게 ${typeStr} <span class='text-red-400 font-bold'>${finalDmg}</span> 피해!` + (attrBonus > 1.0 ? " <span class='text-[9px] text-amber-400'>(상성 우위!)</span>" : ""));
}function executeAttack(unit) {
  var targets = unit.side === 'ally' ? state.battle.enemy : state.battle.ally;
  var target = getValidTarget(unit, targets);
  var dmgType = getUnitStats(unit).isMagic ? 'magic' : 'physical'; // 직업 평타 타입
  if(target) dealDamage(unit, target, 1.0, dmgType);
}

function executeSkill(unit) {
  var enemies = unit.side === 'ally' ? state.battle.enemy : state.battle.ally;
  var allies = unit.side === 'ally' ? state.battle.ally : state.battle.enemy;
  var aliveEnemies = enemies.filter(t => t.hp > 0);
  var aliveAllies = allies.filter(t => t.hp > 0);
  if (aliveEnemies.length === 0) return;
  
  var skillName = unit.activeSkill ? unit.activeSkill.name : (unit.skill ? unit.skill.name : '스킬');
  var desc = unit.activeSkill ? unit.activeSkill.desc : (unit.skill ? unit.skill.desc : '');
  
  addLog(`<span class='grade-${unit.grade} font-bold text-amber-300'>[스킬 발동] ${unit.name} - ${skillName}!!</span>`);

  // 1. 타겟 결정
  var targetEnemies = [];
  var targetAllies = [];
  
  if (desc.includes('적 전체')) targetEnemies = aliveEnemies;
  else if (desc.includes('체력 가장 낮은 적')) {
      targetEnemies = [aliveEnemies.reduce((min, e) => (e.hp/e.maxHp < min.hp/min.maxHp) ? e : min, aliveEnemies[0])];
  }
  else targetEnemies = [getValidTarget(unit, enemies)];

  if (desc.includes('아군 전체')) targetAllies = aliveAllies;
  else if (desc.includes('최저 체력 아군')) {
      targetAllies = [aliveAllies.reduce((min, a) => (a.hp/a.maxHp < min.hp/min.maxHp) ? a : min, aliveAllies[0])];
  }
  else targetAllies = [unit]; 

  // ★ 2. 데미지 배율 및 물리/마법 타입 추출
  var multi = 1.2;
  var dmgType = getUnitStats(unit).isMagic ? 'magic' : 'physical'; // 기본값

  var match = desc.match(/(\d+)%\s*(마법|물리)?\s*피해/);
  if (match) {
      multi = parseInt(match[1]) / 100;
      if (match[2] === '마법') dmgType = 'magic';
      else if (match[2] === '물리') dmgType = 'physical';
  }

  // 3. 상태이상 및 적 타격 적용
  if (desc.includes('피해') || desc.includes('타격') || desc.includes('공격') || desc.includes('참격')) {
      targetEnemies.forEach(e => {
         dealDamage(unit, e, multi, dmgType); // 타입 전달
         if (desc.includes('기절')) e.buffs.push({type: 'stun', amount: 0, turns: 1, name: '기절'});
         if (desc.includes('화상')) e.buffs.push({type: 'burn', amount: 0, turns: 3, name: '화상'});
         if (desc.includes('중독')) e.buffs.push({type: 'poison', amount: 0, turns: 3, name: '중독'});
         if (desc.includes('출혈')) e.buffs.push({type: 'bleed', amount: 0, turns: 3, name: '출혈'});
         if (desc.includes('혼란')) e.buffs.push({type: 'confusion', amount: 0, turns: 1, name: '혼란'});
         if (desc.includes('매혹')) e.buffs.push({type: 'charm', amount: 0, turns: 1, name: '매혹'});
         if (desc.includes('방어 감소') || desc.includes('방어력 감소')) e.buffs.push({type: 'def', amount: -0.2, turns: 2, name: '방어감소'});
         if (desc.includes('속도 감소')) e.buffs.push({type: 'spd', amount: -0.2, turns: 2, name: '속도감소'});
         if (desc.includes('공격 감소') || desc.includes('공격력 감소')) e.buffs.push({type: 'atk', amount: -0.2, turns: 2, name: '공격감소'});
      });
  }

  // 4. 아군 버프 및 회복
  if (desc.includes('회복') || desc.includes('치유')) {
      var healMulti = unit.role === '힐러' ? 2.5 : 0.5;
      targetAllies.forEach(a => {
         var heal = getUnitStats(unit).atk * healMulti;
         a.hp = Math.min(a.maxHp, a.hp + heal);
         addLog(`<span class='text-green-400'>${a.name} 체력 ${Math.floor(heal)} 회복!</span>`);
         if (desc.includes('재생')) a.buffs.push({type: 'regen', val: 0.1, turns: 2, name: '재생'});
      });
  }
  
  targetAllies.forEach(a => {
      if (desc.includes('방어 상승') || desc.includes('방어력 상승') || desc.includes('방어력 20% 상승') || desc.includes('방어력 30% 상승')) {
         a.buffs.push({type: 'def', amount: 0.25, turns: 3, name: '방어상승'});
      }
      if (desc.includes('공격 상승') || desc.includes('공격력 상승') || desc.includes('공격력 15% 증가') || desc.includes('공격력 30% 증가')) {
         a.buffs.push({type: 'atk', amount: 0.25, turns: 3, name: '공격상승'});
      }
      if (desc.includes('속도 상승')) a.buffs.push({type: 'spd', amount: 0.2, turns: 3, name: '속도상승'});
  });

  // 5. 특수 로직 (도발, 고육지책 등)
  if (desc.includes('도발')) unit.buffs.push({type: 'taunt', amount: 0, turns: 2, name: '도발'});
  if (desc.includes('체력 소모') || desc.includes('체력 깎고')) {
      var cost = Math.floor(unit.hp * 0.15);
      unit.hp -= cost;
      addLog(`<span class='text-purple-400'>${unit.name}이(가) 스킬을 위해 체력을 ${cost} 소모!</span>`);
  }
  if (desc.includes('희생하여')) {
      var sacrifice = aliveAllies.find(a => a.id !== unit.id);
      if (sacrifice) {
          sacrifice.hp = 0;
          unit.hp = unit.maxHp;
          addLog(`<span class='text-red-500 font-bold'>${unit.name}이(가) ${sacrifice.name}을(를) 희생시켰습니다!</span>`);
      }
  }
}

function addLog(msg) {
  state.battle.logs.unshift(msg);
  if (state.battle.logs.length > 50) state.battle.logs.pop();
  var logEl = document.getElementById('battle-logs');
  if (logEl) logEl.innerHTML = state.battle.logs.map((l, i) => `<div class="mb-1 pb-1 border-b border-slate-800/50 ${i===0?'opacity-100 font-bold text-white':(i<3?'opacity-80':'opacity-40 text-[10px]')}">${l}</div>`).join('');
}

function renderBattleScreen(container) {
  container.innerHTML = `<div class="flex-1 flex flex-col p-2 h-full gap-1">
    <div id="enemy-area" class="flex justify-around items-end h-[35%] pb-2"></div>
    <div id="battle-logs" class="flex-1 bg-black/60 rounded-xl p-3 overflow-y-auto text-[11px] text-slate-300 border border-slate-700/50 shadow-inner custom-scrollbar"></div>
    <div id="ally-area" class="flex justify-around items-start h-[35%] pt-2"></div>
  </div>`;
  updateBattleUI();
}

function updateBattleUI() {
  var enemyArea = document.getElementById('enemy-area');
  var allyArea = document.getElementById('ally-area');
  if (!enemyArea || !allyArea) return;
  
  var unitHtml = (u) => {
    var isDead = u.hp <= 0;
    var stats = getUnitStats(u);
    var hpPct = Math.max(0, (u.hp / u.maxHp) * 100);
    
    // 버프/디버프 색상 판별
    var colorAtk = stats.atkBonus > 0 ? 'text-green-400' : (stats.atkBonus < 0 ? 'text-red-400' : 'text-slate-200');
    var colorDef = stats.defBonus > 0 ? 'text-green-400' : (stats.defBonus < 0 ? 'text-red-400' : 'text-slate-200');
    var colorSpd = stats.spdBonus > 0 ? 'text-green-400' : (stats.spdBonus < 0 ? 'text-red-400' : 'text-slate-200');

    // 상태 이상 아이콘
    var buffIcons = u.buffs.map(b => {
      var icon = '✨';
      if(b.type === 'atk') icon = '⚔️';
      if(b.type === 'def') icon = '🛡️';
      if(b.type === 'spd') icon = '💨';
      if(b.type === 'stun') icon = '😵';
      if(b.type === 'poison') icon = '☠️';
      if(b.type === 'burn') icon = '🔥';
      if(b.type === 'bleed') icon = '🩸';
      if(b.type === 'charm') icon = '💕';
      if(b.type === 'confusion') icon = '🌀';
      if(b.type === 'taunt') icon = '🎯';
      return `<span class="text-[8px] bg-slate-700 border border-slate-500 rounded px-0.5 mx-0.5" title="${b.name||b.type}">${icon}</span>`;
    }).join('');

    return `<div class="flex flex-col items-center w-[4.8rem] transition-opacity ${isDead ? 'opacity-30 grayscale' : ''}">
      <div class="h-3 text-[10px] mb-0.5 flex justify-center w-full">${buffIcons}</div>
      <div class="relative"><img src="${getImgUrl(u.id)}" class="w-12 h-12 rounded-full border-2 ${u.side==='ally'?'border-sky-500':'border-red-500'} bg-slate-900 shadow-lg mb-1"><span class="absolute -top-1 -right-1 text-[8px] attr-${attrMap[u.attr]} bg-black/80 px-1 rounded-full border border-slate-600">${attrMap[u.attr]}</span></div>
      <div class="text-[9px] mb-1 font-bold grade-${u.grade}">${u.name}</div>
      
      <div class="w-full bg-slate-900 h-3.5 rounded-full overflow-hidden mb-1 border border-slate-700 relative shadow-inner">
        <div class="hp-bar bg-red-500 h-full" style="width:${hpPct}%"></div>
        <span class="absolute inset-0 flex items-center justify-center text-[8px] font-bold text-white shadow-black drop-shadow-md">${Math.floor(u.hp)}/${Math.floor(u.maxHp)}</span>
      </div>
      
      <div class="w-full bg-slate-900 h-1 rounded-full overflow-hidden mb-1 border border-slate-700"><div class="bg-amber-400 h-full hp-bar" style="width: ${Math.min(100, (u.atb / 1000) * 100)}%"></div></div>
      
      <div class="w-full mt-0.5 bg-slate-800/80 border border-slate-600 rounded p-1 text-[8px] leading-tight grid grid-cols-1 gap-y-0.5 shadow-md text-left">
        <div class="flex justify-between text-slate-400"><span>공:</span><span class="font-bold ${colorAtk}">${stats.atk}</span></div>
        <div class="flex justify-between text-slate-400"><span>방:</span><span class="font-bold ${colorDef}">${stats.def}</span></div>
        <div class="flex justify-between text-slate-400"><span>속:</span><span class="font-bold ${colorSpd}">${stats.spd}</span></div>
      </div>
    </div>`;
  };
  
  enemyArea.innerHTML = state.battle.enemy.map(unitHtml).join('');
  allyArea.innerHTML = state.battle.ally.map(unitHtml).join('');
}
