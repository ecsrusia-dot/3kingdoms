<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데로드앤데블랑 v0.3 - Fixed</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { margin: 0; background: #050304; color: #e8d9c4; font-family: 'Noto Serif KR', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #error-display { position: fixed; top: 0; left: 0; width: 100%; background: #7a2820; color: white; padding: 10px; font-size: 12px; z-index: 9999; display: none; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div id="error-display"></div>
    <div id="root"></div>

    <script type="text/babel">
        // 에러 핸들러: 만약 실행 중 에러가 나면 화면 상단에 표시합니다.
        window.onerror = function(msg, url, line) {
            const errDiv = document.getElementById('error-display');
            errDiv.style.display = 'block';
            errDiv.innerHTML = "코드 실행 오류 발생: " + msg + "\n(Line: " + line + ")";
        };

        const { useState, useEffect, useMemo, useRef } = React;
        const { Sword, Shield, Heart, Zap, Skull, Sparkles, Eye, Flame, Crown, BookOpen, Compass, ChevronRight, X, RefreshCw, Lock, Check, Droplet, Wind, Activity, AlertTriangle } = lucideReact;

        const PALETTE = {
            bg: '#0a0608', bgDeep: '#050304', panel: '#1a0e12', panelBorder: '#3d1f28',
            accent: '#c4453d', derod: '#d4a574', deblan: '#5c4a8c', text: '#e8d9c4', textDim: '#9b8975',
            ice: '#7ba3c4', blood: '#8b1f1f', green: '#7a9a5e', legendary: '#e8b04a', defense: '#7ba3c4'
        };

        const PASSIVE_SKILLS = {
            강타: { color: '#c4453d', tiers: { 3: { text: '충격 부여', trigger: 'onAttack', effect: 'applyShock' }, 5: { text: '데미지 +50%', trigger: 'passive', effect: 'shockDmg+50' } } },
            회피: { color: '#7a9a5e', tiers: { 3: { text: '회피 +15%', trigger: 'passive', effect: 'dodge+15' }, 7: { text: '첫 피격 무효', trigger: 'onCombatStart', effect: 'firstHitImmune' } } },
            가속: { color: '#e8b04a', tiers: { 7: { text: '3턴마다 추가 턴', trigger: 'onTurnStart', effect: 'extraTurn', interval: 3 } } }
        };

        const CLASSES = [
            { id: 'lanthert', name: '방랑검사', stats: { 근력: 16, 민첩: 15, 지능: 14 }, combatSkills: ['참격', '수비'], color: '#c4453d', startSkills: { 강타: 3, 회피: 7 } }
        ];

        const COMBAT_SKILLS = {
            참격: { name: '참격', cost: 0, type: 'physical', baseDmg: [20, 30] },
            수비: { name: '수비', cost: 0, type: 'defense', defense: 40 }
        };

        const ENEMIES = {
            wraith: { name: '극지의 망령', hp: 200, color: '#7ba3c4', patterns: [{ name: '얼음 손길', dmg: [15, 25], type: 'attack' }] }
        };

        function PhoneFrame({ children }) {
            return (
                <div className="relative mx-auto border-[8px] border-[#050304] rounded-[36px] shadow-2xl overflow-hidden" style={{ width: '375px', height: '780px', background: PALETTE.bg }}>
                    {children}
                </div>
            );
        }

        function CombatScreen({ classData, initialPlayer, enemyKey }) {
            const [player, setPlayer] = useState({ ...initialPlayer, defense: 0, cooldowns: {}, ether: 3 });
            const [enemy, setEnemy] = useState(() => {
                const e = ENEMIES[enemyKey];
                return { ...e, currentHp: e.hp, maxHp: e.hp, defense: 0, nextIntent: e.patterns[0] };
            });
            const [log, setLog] = useState([{ type: 'system', text: `━━ ${enemy.name} 출현 ━━` }]);
            const [phase, setPhase] = useState('playerTurn');

            const handleAttack = () => {
                if (phase !== 'playerTurn') return;
                const dmg = Math.floor(20 + Math.random() * 10);
                const newEnemyHp = Math.max(0, enemy.currentHp - dmg);
                
                setEnemy(prev => ({ ...prev, currentHp: newEnemyHp }));
                setLog(prev => [...prev, { type: 'player', text: `▸ 참격: ${dmg} 데미지` }]);
                
                if (newEnemyHp <= 0) {
                    setPhase('victory');
                } else {
                    setPhase('enemyTurn');
                    setTimeout(executeEnemyTurn, 800);
                }
            };

            const executeEnemyTurn = () => {
                const dmg = Math.floor(10 + Math.random() * 10);
                setPlayer(prev => ({ ...prev, hp: Math.max(0, prev.hp - dmg) }));
                setLog(prev => [...prev, { type: 'enemy', text: `◂ 적의 공격: ${dmg} 데미지` }]);
                setPhase('playerTurn');
            };

            return (
                <div className="absolute inset-0 flex flex-col">
                    <div className="p-4 border-b border-[#3d1f28] flex justify-between text-[10px]">
                        <span className="text-red-500 font-bold">전투 시스템 v0.3</span>
                        <span>TURN 1</span>
                    </div>
                    
                    <div className="p-4 bg-black/40">
                        <div className="flex justify-between text-xs mb-1">
                            <span style={{ color: enemy.color }}>{enemy.name}</span>
                            <span>{enemy.currentHp}/{enemy.maxHp}</span>
                        </div>
                        <div className="h-1.5 bg-gray-900">
                            <div className="h-full bg-red-800 transition-all" style={{ width: `${(enemy.currentHp/enemy.maxHp)*100}%` }} />
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-3 space-y-1 text-[11px]">
                        {log.map((l, i) => <div key={i} className={l.type === 'player' ? 'text-green-400' : 'text-red-400'}>{l.text}</div>)}
                    </div>

                    <div className="p-4 border-t border-[#3d1f28]">
                        <div className="flex justify-between text-xs mb-1">
                            <span>{classData.name}</span>
                            <span>{player.hp}/{player.maxHp}</span>
                        </div>
                        <div className="h-1.5 bg-gray-900">
                            <div className="h-full bg-green-700 transition-all" style={{ width: `${(player.hp/player.maxHp)*100}%` }} />
                        </div>
                    </div>

                    <div className="p-4 grid grid-cols-2 gap-2 bg-[#1a0e12]">
                        <button onClick={handleAttack} disabled={phase !== 'playerTurn'} className="py-3 border border-red-900 text-xs hover:bg-red-900/20 disabled:opacity-30">참격</button>
                        <button className="py-3 border border-blue-900 text-xs opacity-30">수비</button>
                        {phase === 'victory' && <button onClick={() => location.reload()} className="col-span-2 py-2 bg-yellow-900/20 border border-yellow-600 text-yellow-500 text-xs">승리! (재시작)</button>}
                    </div>
                </div>
            );
        }

        function App() {
            return (
                <PhoneFrame>
                    <CombatScreen 
                        classData={CLASSES[0]} 
                        initialPlayer={{ hp: 300, maxHp: 300, ...CLASSES[0].stats }} 
                        enemyKey="wraith" 
                    />
                </PhoneFrame>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
