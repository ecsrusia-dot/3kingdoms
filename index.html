<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>삼국지: 천기의 기록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grade-UR { color: #f43f5e; text-shadow: 0 0 8px rgba(244,63,94,0.7); font-weight: 900; }
        .grade-SSR { color: #fbbf24; text-shadow: 0 0 6px rgba(251,191,36,0.6); }
        .grade-SR { color: #c084fc; font-weight: bold; }
        .grade-R { color: #60a5fa; }
        .grade-N { color: #9ca3af; }
        .attr-天 { color: #38bdf8; text-shadow: 0 0 5px #0ea5e9; font-weight: 900; }
        .attr-地 { color: #34d399; text-shadow: 0 0 5px #10b981; font-weight: 900; }
        .attr-人 { color: #fb7185; text-shadow: 0 0 5px #f43f5e; font-weight: 900; }
        .hp-bar { transition: width 0.3s ease-out; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        @keyframes earthquake { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 20% { transform: translate(-5px, 5px) rotate(-2deg); } 40% { transform: translate(5px, -5px) rotate(2deg); } 60% { transform: translate(-5px, -5px) rotate(-1deg); } 80% { transform: translate(5px, 5px) rotate(1deg); } }
        @keyframes flashRed { 0% { box-shadow: inset 0 0 50px #9f1239; background-color: rgba(0,0,0,0.9); } 100% { box-shadow: inset 0 0 200px #f43f5e; background-color: rgba(159,18,57,0.3); } }
        @keyframes flashGold { 0% { box-shadow: inset 0 0 30px #b45309; background-color: rgba(0,0,0,0.9); } 100% { box-shadow: inset 0 0 150px #fbbf24; background-color: rgba(180,83,9,0.3); } }
        .fx-ur { animation: earthquake 0.15s infinite, flashRed 0.3s alternate infinite; }
        .fx-ssr { animation: flashGold 0.5s alternate infinite; }
    </style>
</head>
<body class="bg-slate-900 text-slate-300 font-sans select-none overflow-hidden fixed inset-0 flex flex-col">

    <header class="bg-slate-800 p-3 flex justify-between items-center border-b border-slate-700 shrink-0 z-10 shadow-md">
        <div class="text-base font-bold text-white tracking-widest">📜 천기의 기록</div>
        <div class="flex gap-3 text-xs font-semibold">
            <span class="text-blue-300">💠 <span id="ui-skystone">0</span></span>
            <span class="text-green-300">📜 <span id="ui-manual">0</span></span>
            <span class="text-purple-400">🕯️ <span id="ui-legacy">0</span></span>
        </div>
    </header>

    <main id="main-content" class="flex-1 overflow-y-auto relative w-full flex flex-col"></main>

    <footer class="bg-slate-800 flex justify-around p-2 border-t border-slate-700 shrink-0 text-[11px] font-bold pb-safe z-10 shadow-lg">
        <button onclick="switchTab('barracks')" id="tab-barracks" class="flex-1 py-3 text-center rounded hover:bg-slate-700 transition-colors">⛺ 막사</button>
        <button onclick="switchTab('battle')" id="tab-battle" class="flex-1 py-3 text-center rounded hover:bg-slate-700 text-yellow-400 transition-colors">⚔️ 출정</button>
        <button onclick="switchTab('gacha')" id="tab-gacha" class="flex-1 py-3 text-center rounded hover:bg-slate-700 text-blue-400 transition-colors">🏮 등용</button>
        <button onclick="switchTab('codex')" id="tab-codex" class="flex-1 py-3 text-center rounded hover:bg-slate-700 text-emerald-400 transition-colors">📖 도감</button>
        <button onclick="switchTab('legacy')" id="tab-legacy" class="flex-1 py-3 text-center rounded hover:bg-slate-700 text-purple-400 transition-colors">🏛️ 가문</button>
    </footer>

    <div id="gacha-fx" class="hidden fixed inset-0 z-[60] flex flex-col items-center justify-center pointer-events-none"><h1 id="fx-text" class="tracking-widest"></h1></div>

    <div id="modal-gacha" class="hidden fixed inset-0 z-50 bg-black/95 flex flex-col items-center justify-center p-4 backdrop-blur-md">
        <div class="text-center w-full max-w-sm">
            <h2 class="text-2xl font-bold text-amber-400 mb-4 border-b border-slate-700 pb-2">등용 결과</h2>
            <div id="gacha-result-list" class="grid grid-cols-2 gap-3 max-h-[60vh] overflow-y-auto pr-1 pb-4"></div>
            <button onclick="closeModal('modal-gacha')" class="mt-4 w-full py-4 bg-slate-700 text-white font-bold rounded-xl shadow-lg active:scale-95">확인 완료</button>
        </div>
    </div>

    <div id="modal-char-info" class="hidden fixed inset-0 z-[70] bg-black/90 flex flex-col items-center justify-center p-4 backdrop-blur-md transition-opacity">
        <div class="bg-slate-800 border border-slate-600 rounded-2xl w-full max-w-sm p-5 relative shadow-2xl overflow-y-auto max-h-[85vh] custom-scrollbar">
            <button onclick="closeModal('modal-char-info')" class="absolute top-3 right-3 w-8 h-8 bg-slate-700 rounded-full flex items-center justify-center font-bold text-slate-300 hover:text-white border border-slate-500 z-20">X</button>
            <div id="char-modal-content" class="flex flex-col items-center pt-2"></div>
        </div>
    </div>

    <script>
        // 에러 추적기 (에러 발생 시 화면에 빨간 글씨로 띄움)
        window.onerror = function(msg, url, line) {
            var main = document.getElementById('main-content');
            if(main) main.innerHTML = '<div class="p-4 text-red-400 font-bold break-words mt-10 border border-red-500 bg-red-900/30 rounded">🚨 시스템 에러 발생:<br>' + msg + '<br>Line: ' + line + '</div>';
            return false;
        };

        var state = {
            activeTab: 'gacha',
            player: { resources: { skyStones: 5000, tacticsManuals: 0, legacyPoints: 0 }, roster: [], party: [null, null, null, null, null] },
            battle: { timer: null, logs: [], ally: [], enemy: [] }
        };

        var attrMap = { '천': '天', '지': '地', '인': '人' };

        var HERO_DB = [
            { id: 'H001', name: '유비', grade: 'UR', role: '군주', attr: '인', stats: { str: 60, int: 85, con: 80, spd: 65 }, skill: { name: '도원결의', desc: '아군 전체 체력/방어력 상승' }, bonds: '도원결의 (관우, 장비)' },
            { id: 'H002', name: '관우', grade: 'UR', role: '맹장', attr: '천', stats: { str: 98, int: 75, con: 85, spd: 78 }, skill: { name: '청룡참', desc: '단일 적 치명적 피해 및 기절' }, bonds: '오호대장군' },
            { id: 'H003', name: '장비', grade: 'UR', role: '호위', attr: '지', stats: { str: 97, int: 40, con: 95, spd: 70 }, skill: { name: '사자후', desc: '적 전체 확률적 기절 및 도발' }, bonds: '도원결의 (유비, 관우)' },
            { id: 'H004', name: '조운', grade: 'UR', role: '맹장', attr: '인', stats: { str: 96, int: 70, con: 85, spd: 92 }, skill: { name: '일신시담', desc: '민첩 50% 상승 및 2회 공격' }, bonds: '오호대장군' },
            { id: 'H005', name: '여포', grade: 'UR', role: '맹장', attr: '천', stats: { str: 100, int: 30, con: 90, spd: 85 }, skill: { name: '무쌍난무', desc: '광역 방어구 관통 피해' }, bonds: '인중여포' },
            { id: 'H006', name: '제갈량', grade: 'UR', role: '모사', attr: '천', stats: { str: 20, int: 100, con: 60, spd: 80 }, skill: { name: '동남풍', desc: '광역 화속성 피해 및 민첩 감소' }, bonds: '와룡봉추' },
            { id: 'H007', name: '하후돈', grade: 'SSR', role: '호위', attr: '천', stats: { str: 88, int: 60, con: 92, spd: 62 }, skill: { name: '맹장의 분노', desc: '피격 시 피해 반사' }, bonds: '조조의 심복' },
            { id: 'H008', name: '마초', grade: 'SSR', role: '맹장', attr: '지', stats: { str: 93, int: 45, con: 80, spd: 88 }, skill: { name: '철기돌격', desc: '관통 피해 및 방어력 감소' }, bonds: '서량의 맹장' },
            { id: 'H009', name: '위연', grade: 'SR', role: '맹장', attr: '인', stats: { str: 85, int: 50, con: 75, spd: 75 }, skill: { name: '반골의 일격', desc: '체력이 낮을수록 피해 증가' }, bonds: '불운한 명장' },
            { id: 'H010', name: '황개', grade: 'R', role: '호위', attr: '지', stats: { str: 75, int: 60, con: 80, spd: 55 }, skill: { name: '고육지책', desc: '체력 소모하여 아군 방어력 상승' }, bonds: '적벽의 불꽃' },
            { id: 'H011', name: '황건적', grade: 'N', role: '맹장', attr: '지', stats: { str: 30, int: 10, con: 30, spd: 30 }, skill: { name: '창찌르기', desc: '기본 공격' }, bonds: '황건의 난' },
            { id: 'H012', name: '민병대', grade: 'N', role: '호위', attr: '인', stats: { str: 20, int: 10, con: 40, spd: 25 }, skill: { name: '방패막기', desc: '자신 방어력 소폭 상승' }, bonds: '농민의 분노' }
        ];

        function getImgUrl(seed) { return 'https://api.dicebear.com/9.x/adventurer/svg?seed=' + seed + '&backgroundColor=0f172a'; }

        function updateUI() {
            document.getElementById('ui-skystone').innerText = state.player.resources.skyStones.toLocaleString();
            document.getElementById('ui-manual').innerText = state.player.resources.tacticsManuals.toLocaleString();
            document.getElementById('ui-legacy').innerText = state.player.resources.legacyPoints.toLocaleString();
        }

        function switchTab(tab) {
            state.activeTab = tab;
            if(state.battle.timer) clearInterval(state.battle.timer);
            
            var tabs = ['barracks', 'battle', 'gacha', 'codex', 'legacy'];
            for(var i=0; i<tabs.length; i++) {
                var btn = document.getElementById('tab-' + tabs[i]);
                if(btn) btn.classList.remove('bg-slate-700');
            }
            var activeBtn = document.getElementById('tab-' + tab);
            if(activeBtn) activeBtn.classList.add('bg-slate-700');

            var main = document.getElementById('main-content');
            if(!main) return;
            main.className = (tab === 'battle') ? "flex-1 overflow-hidden relative w-full flex flex-col" : "flex-1 overflow-y-auto p-4 relative w-full flex flex-col";

            if (tab === 'gacha') renderGacha(main);
            else if (tab === 'barracks') renderBarracks(main);
            else if (tab === 'battle') initBattle(main);
            else if (tab === 'codex') renderCodex(main);
            else main.innerHTML = '<div class="flex items-center justify-center h-full text-slate-500">준비 중입니다.</div>';
        }

        function renderGacha(container) {
            container.innerHTML = 
                '<div class="text-center mt-6 mb-8">' +
                    '<h2 class="text-3xl font-bold text-blue-400 mb-2 drop-shadow-md">🏮 천기 등용문</h2>' +
                    '<p class="text-xs text-slate-400">0.05%의 기적, 신화 무장을 소환하세요.</p>' +
                '</div>' +
                '<div class="flex flex-col gap-5 max-w-xs mx-auto mt-10">' +
                    '<button onclick="doGacha(1)" class="w-full py-4 bg-slate-800 border-2 border-blue-500/30 rounded-xl font-bold text-white shadow-lg active:scale-95 transition-transform">1회 소환 <span class="text-sky-300 text-xs ml-2">💠 100</span></button>' +
                    '<button onclick="doGacha(10)" class="w-full py-5 bg-slate-800 border-2 border-amber-500/50 rounded-xl font-bold text-lg text-white shadow-[0_0_15px_rgba(245,158,11,0.2)] active:scale-95 transition-transform">10회 소환 <span class="text-amber-300 text-sm ml-2">💠 1,000</span></button>' +
                '</div>';
        }

        function doGacha(times) {
            var cost = times * 100;
            if(state.player.resources.skyStones < cost) return alert("천운석이 부족합니다!");
            state.player.resources.skyStones -= cost;
            
            var results = [];
            var highestGrade = 'N';

            for(var i=0; i<times; i++) {
                var roll = Math.random() * 100;
                var grade = roll < 0.05 ? 'UR' : (roll < 1.05 ? 'SSR' : (roll < 11.05 ? 'SR' : (roll < 51.05 ? 'R' : 'N')));
                if(grade === 'UR') highestGrade = 'UR';
                else if(grade === 'SSR' && highestGrade !== 'UR') highestGrade = 'SSR';

                var pool = HERO_DB.filter(function(h) { return h.grade === grade; });
                if(pool.length === 0) pool = HERO_DB.filter(function(h) { return h.grade === 'N'; });
                var hero = pool[Math.floor(Math.random() * pool.length)];
                
                var existing = state.player.roster.find(function(r) { return r.id === hero.id; });
                if(existing) { 
                    existing.count++; 
                    results.push(Object.assign({}, hero, {isDup: true})); 
                } else { 
                    state.player.roster.push({id: hero.id, count: 1}); 
                    results.push(Object.assign({}, hero, {isDup: false})); 
                }
            }
            updateUI();
            
            if(highestGrade === 'UR' || highestGrade === 'SSR') playGachaFX(highestGrade, results);
            else showGachaResults(results);
        }

        function playGachaFX(grade, results) {
            var fxScreen = document.getElementById('gacha-fx');
            var fxText = document.getElementById('fx-text');
            fxScreen.classList.remove('hidden');

            if(grade === 'UR') {
                fxScreen.className = 'fixed inset-0 z-[60] flex flex-col items-center justify-center pointer-events-none fx-ur';
                fxText.innerHTML = '<span class="text-red-500 drop-shadow-[0_0_20px_#ef4444] text-4xl font-black">천기가 요동칩니다...!!</span>';
            } else {
                fxScreen.className = 'fixed inset-0 z-[60] flex flex-col items-center justify-center pointer-events-none fx-ssr';
                fxText.innerHTML = '<span class="text-amber-400 drop-shadow-[0_0_15px_#f59e0b] text-3xl font-bold">영웅의 기운이 느껴집니다!</span>';
            }

            setTimeout(function() {
                fxScreen.classList.add('hidden');
                showGachaResults(results);
            }, 2500);
        }

        function showGachaResults(results) {
            var html = '';
            results.forEach(function(r) {
                var border = r.grade === 'UR' ? 'border-red-500 bg-red-900/30' : (r.grade === 'SSR' ? 'border-amber-500 bg-amber-900/30' : 'border-slate-700 bg-slate-800');
                var txt = r.isDup ? '<div class="text-[9px] mt-1 text-amber-400 font-bold">✨ 돌파 조각</div>' : '<div class="text-[10px] mt-1 text-green-400 font-bold">NEW!</div>';
                var attrChar = attrMap[r.attr] || '無';
                html += '<div class="border ' + border + ' p-3 rounded-xl text-center shadow-lg relative overflow-hidden flex flex-col items-center">' +
                        '<span class="absolute top-1 left-1 text-[10px] bg-black/50 px-1 rounded attr-' + attrChar + '">' + attrChar + '</span>' +
                        '<div class="text-[10px] text-slate-400 mb-1 absolute top-1 right-1">' + r.grade + '</div>' +
                        '<img src="' + getImgUrl(r.id) + '" class="w-14 h-14 rounded-full border border-slate-600 mb-2 mt-2 bg-slate-900 shadow-inner">' +
                        '<div class="font-bold text-sm grade-' + r.grade + '">' + r.name + '</div>' + txt + '</div>';
            });
            document.getElementById('gacha-result-list').innerHTML = html;
            document.getElementById('modal-gacha').classList.remove('hidden');
        }

        function renderBarracks(container) {
            var html = '<div class="text-center mb-4 font-bold text-amber-400 drop-shadow">전술 진형 편성 (터치하여 해제)</div><div class="flex gap-2 mb-6 justify-center w-full max-w-sm mx-auto">';
            for(var i=0; i<5; i++) {
                var id = state.player.party[i];
                var h = id ? HERO_DB.find(function(x) { return x.id === id; }) : null;
                var style = h ? 'border-sky-500 bg-slate-800 shadow-[0_0_8px_rgba(14,165,233,0.3)]' : 'border-slate-700 bg-slate-900 border-dashed opacity-60';
                
                html += '<div onclick="removeFromParty(' + i + ')" class="w-[70px] h-[90px] border-2 ' + style + ' rounded-lg flex flex-col items-center justify-center cursor-pointer relative overflow-hidden p-1">';
                if(h) {
                    html += '<img src="' + getImgUrl(h.id) + '" class="w-8 h-8 rounded-full mb-1"><span class="text-[11px] font-bold grade-' + h.grade + ' leading-tight">' + h.name + '</span><span class="text-[10px] attr-' + attrMap[h.attr] + ' mt-1 font-black">' + attrMap[h.attr] + '</span>';
                } else {
                    html += '<span class="text-[10px] text-slate-500">비어있음</span>';
                }
                html += '</div>';
            }
            
            html += '</div><div class="text-xs font-bold mb-2 border-b border-slate-700 pb-1 text-slate-300">보유 무장 <span class="font-normal text-[10px] text-slate-500">(좌측 클릭 시 상세정보)</span></div><div class="flex-1 overflow-y-auto space-y-2 pb-10">';
            
            if(state.player.roster.length === 0) {
                html += '<div class="text-center text-slate-500 py-6 text-[11px] bg-slate-800/50 rounded-lg">보유한 무장이 없습니다.</div>';
            } else {
                state.player.roster.forEach(function(r) {
                    var d = HERO_DB.find(function(x) { return x.id === r.id; });
                    var inP = state.player.party.indexOf(d.id) !== -1;
                    var bStyle = inP ? 'border-slate-700 opacity-50' : 'border-slate-600 bg-slate-800 active:bg-slate-700';
                    var statStr = '무' + d.stats.str + ' 지' + d.stats.int + ' 통' + d.stats.con + ' 속' + d.stats.spd;
                    var attrChar = attrMap[d.attr];
                    
                    html += '<div class="p-3 rounded-lg border ' + bStyle + ' flex justify-between items-center transition-all">' +
                            '<div class="flex items-center gap-3 cursor-pointer" onclick="openCharModal(\'' + d.id + '\')">' +
                            '<img src="' + getImgUrl(d.id) + '" class="w-12 h-12 rounded-lg border border-slate-600 bg-slate-900 shadow-md">' +
                            '<div><div class="grade-' + d.grade + ' font-bold text-base mb-1">' + d.name + ' <span class="attr-' + attrChar + ' text-[12px] ml-1">(' + attrChar + ')</span></div>' +
                            '<div class="text-[10px] text-slate-400">' + statStr + '</div></div></div>' +
                            '<div class="flex flex-col items-end gap-1">' +
                            '<button onclick="' + (inP ? 'removeFromPartyByHero(\'' + d.id + '\')' : 'addToParty(\'' + d.id + '\')') + '" class="text-[10px] font-bold ' + (inP ? 'text-slate-400 bg-slate-700 px-3 py-1.5 rounded border border-slate-600' : 'text-amber-400 bg-amber-900/30 px-3 py-1.5 rounded border border-amber-500/50 active:scale-95') + '">' + (inP ? '해제' : '배치') + '</button>' +
                            '<div class="text-[9px] text-slate-500 mt-1">x' + r.count + ' 돌파</div></div></div>';
                });
            }
            container.innerHTML = html + '</div>';
        }

        function addToParty(id) {
            var idx = state.player.party.indexOf(null);
            if(idx !== -1) { state.player.party[idx] = id; renderBarracks(document.getElementById('main-content')); }
            else { alert("진형이 꽉 찼습니다! 위 편성창에서 무장을 터치해 해제하세요."); }
        }
        function removeFromParty(i) { state.player.party[i] = null; renderBarracks(document.getElementById('main-content')); }
        function removeFromPartyByHero(id) {
            var idx = state.player.party.indexOf(id);
            if(idx !== -1) { state.player.party[idx] = null; renderBarracks(document.getElementById('main-content')); }
        }

        function renderCodex(container) {
            var ownedCount = state.player.roster.length;
            var totalCount = HERO_DB.length;
            var pct = Math.floor((ownedCount / totalCount) * 100);

            var html = '<div class="text-center mb-6 mt-2"><h2 class="text-2xl font-bold text-emerald-400 drop-shadow mb-2">📖 영웅 도감</h2>' +
                       '<div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden max-w-xs mx-auto border border-slate-700 mb-1"><div class="bg-emerald-400 h-full" style="width: ' + pct + '%"></div></div>' +
                       '<p class="text-[10px] text-slate-400">수집률: ' + ownedCount + ' / ' + totalCount + '명 (' + pct + '%)</p></div>' +
                       '<div class="grid grid-cols-4 gap-3 pb-10">';

            var order = {'UR':5, 'SSR':4, 'SR':3, 'R':2, 'N':1};
            var sortedDB = HERO_DB.slice().sort(function(a,b) { return (order[b.grade]||0) - (order[a.grade]||0) || a.id.localeCompare(b.id); });

            sortedDB.forEach(function(h) {
                var isOwned = state.player.roster.some(function(r) { return r.id === h.id; });
                var attrChar = attrMap[h.attr] || '無';
                html += '<div onclick="openCharModal(\'' + h.id + '\')" class="flex flex-col items-center cursor-pointer transition-transform active:scale-95 ' + (isOwned ? '' : 'opacity-30 grayscale') + '">' +
                        '<div class="relative mb-1"><img src="' + getImgUrl(h.id) + '" class="w-14 h-14 rounded-full border-2 ' + (isOwned ? 'border-sky-500' : 'border-slate-600') + ' bg-slate-800 shadow-md">' +
                        '<span class="absolute -top-1 -right-1 text-[8px] attr-' + attrChar + ' bg-black/80 px-1 rounded-full border border-slate-600">' + attrChar + '</span></div>' +
                        '<div class="text-[9px] mb-0.5 grade-' + h.grade + ' border border-slate-700 px-1 rounded bg-slate-900">' + h.grade + '</div>' +
                        '<div class="text-[10px] font-bold text-center w-full truncate ' + (isOwned ? 'text-slate-300' : 'text-slate-500') + '">' + (isOwned ? h.name : '미확인') + '</div></div>';
            });
            container.innerHTML = html + '</div>';
        }

        function openCharModal(id) {
            var h = HERO_DB.find(function(x) { return x.id === id; });
            if(!h) return;
            
            var isOwned = state.player.roster.some(function(r) { return r.id === h.id; });
            var attrChar = attrMap[h.attr] || '無';
            var statTotal = h.stats.str + h.stats.int + h.stats.con + h.stats.spd;
            var lockedDiv = '<div class="absolute inset-0 bg-slate-900/80 backdrop-blur-[2px] z-10 flex items-center justify-center text-sm font-bold text-slate-500 border border-slate-700">정보 잠김</div>';
            
            var html = '<div class="relative mb-4 mt-2"><img src="' + getImgUrl(h.id) + '" class="w-24 h-24 rounded-full border-4 ' + (isOwned ? 'border-sky-400' : 'border-slate-600 grayscale') + ' bg-slate-900 shadow-xl">' +
                       '<span class="absolute -bottom-2 right-0 text-sm attr-' + attrChar + ' bg-black/80 px-2 py-0.5 rounded-full border border-slate-600">' + attrChar + '</span></div>' +
                       '<div class="text-center mb-4 w-full"><div class="flex justify-center items-center gap-2 mb-1"><span class="text-[10px] grade-' + h.grade + ' border border-slate-600 px-2 rounded-full bg-slate-900">' + h.grade + '</span>' +
                       '<span class="text-[10px] text-slate-400 border border-slate-600 px-2 rounded-full bg-slate-900">' + h.role + '</span></div>' +
                       '<div class="text-2xl font-bold ' + (isOwned ? 'text-white' : 'text-slate-500') + ' mb-1">' + (isOwned ? h.name : '미확인 무장') + '</div>' +
                       (isOwned ? '<div class="text-[10px] text-amber-400">총합 전투력: ' + statTotal + '</div>' : '<div class="text-[10px] text-slate-500">등용 시 정보가 개방됩니다.</div>') + '</div>' +
                       
                       '<div class="w-full bg-slate-900 rounded-xl p-3 mb-3 border border-slate-700 relative overflow-hidden">' + (!isOwned ? lockedDiv : '') +
                       '<div class="text-xs text-amber-400 mb-2 font-bold flex items-center gap-1"><span>📊</span> 기초 스탯</div><div class="grid grid-cols-2 gap-y-2 gap-x-4 text-xs">' +
                       '<div class="flex items-center justify-between"><span class="text-slate-400">무력</span><div class="w-16 bg-slate-800 h-1.5 rounded overflow-hidden"><div class="bg-red-400 h-full" style="width:' + ((h.stats.str/120)*100) + '%"></div></div><span class="font-bold text-red-400 w-6 text-right">' + h.stats.str + '</span></div>' +
                       '<div class="flex items-center justify-between"><span class="text-slate-400">지력</span><div class="w-16 bg-slate-800 h-1.5 rounded overflow-hidden"><div class="bg-blue-400 h-full" style="width:' + ((h.stats.int/120)*100) + '%"></div></div><span class="font-bold text-blue-400 w-6 text-right">' + h.stats.int + '</span></div>' +
                       '<div class="flex items-center justify-between"><span class="text-slate-400">통솔</span><div class="w-16 bg-slate-800 h-1.5 rounded overflow-hidden"><div class="bg-green-400 h-full" style="width:' + ((h.stats.con/120)*100) + '%"></div></div><span class="font-bold text-green-400 w-6 text-right">' + h.stats.con + '</span></div>' +
                       '<div class="flex items-center justify-between"><span class="text-slate-400">민첩</span><div class="w-16 bg-slate-800 h-1.5 rounded overflow-hidden"><div class="bg-sky-400 h-full" style="width:' + ((h.stats.spd/120)*100) + '%"></div></div><span class="font-bold text-sky-400 w-6 text-right">' + h.stats.spd + '</span></div></div></div>' +

                       '<div class="w-full bg-slate-900 rounded-xl p-3 mb-3 border border-slate-700 relative">' + (!isOwned ? lockedDiv : '') +
                       '<div class="text-xs text-amber-400 mb-1 font-bold flex items-center gap-1"><span>⚔️</span> 고유 스킬: <span class="text-white">' + (h.skill ? h.skill.name : '없음') + '</span></div>' +
                       '<div class="text-[11px] text-slate-300 leading-relaxed pl-3 border-l-2 border-slate-600 mt-2">' + (h.skill ? h.skill.desc : '-') + '</div></div>' +

                       '<div class="w-full bg-slate-900 rounded-xl p-3 border border-slate-700 relative">' + (!isOwned ? lockedDiv : '') +
                       '<div class="text-xs text-amber-400 mb-1 font-bold flex items-center gap-1"><span>🔗</span> 운명의 인연</div>' +
                       '<div class="text-[11px] text-slate-400 pl-3 border-l-2 border-slate-600 mt-2">' + (h.bonds || '인연 없음') + '</div></div>';
            
            document.getElementById('char-modal-content').innerHTML = html;
            document.getElementById('modal-char-info').classList.remove('hidden');
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        window.onload = function() {
            updateUI();
            switchTab('gacha');
        };
    </script>
</body>
</html>
