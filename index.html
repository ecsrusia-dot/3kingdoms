<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>데로드앤데블랑 v0.3 - Final Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { margin: 0; background: #050304; color: #e8d9c4; font-family: 'Noto Serif KR', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; touch-action: manipulation; }
        .loading-screen { position: fixed; inset: 0; background: #050304; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .spinner { width: 30px; height: 30px; border: 2px solid #1a0e12; border-top-color: #c4453d; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error-log { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(122, 40, 32, 0.9); color: white; font-size: 10px; padding: 5px; z-index: 1000; display: none; max-height: 50px; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="loading" class="loading-screen">
        <div class="spinner"></div>
        <p id="loading-text" style="margin-top: 15px; font-size: 11px; color: #7a2820; letter-spacing: 0.1em;">엔진 초기화 중...</p>
    </div>
    <div id="error-log"></div>
    <div id="root"></div>

    <script type="text/babel">
        // 1. 에러 로그 시스템
        window.onerror = function(msg, url, line) {
            const log = document.getElementById('error-log');
            log.style.display = 'block';
            log.innerHTML = `Error: ${msg} (Line: ${line})`;
            return false;
        };

        const { useState, useEffect, useMemo, useRef } = React;

        // 2. 아이콘 로딩 대기 시스템
        const getIcons = () => {
            const icons = window.lucideReact || {};
            const names = [
                'Sword', 'Shield', 'Heart', 'Zap', 'Skull', 'Sparkles', 'Eye', 'Flame', 
                'Crown', 'BookOpen', 'Compass', 'ChevronRight', 'X', 'RefreshCw', 
                'Lock', 'Check', 'Droplet', 'Wind', 'Activity', 'AlertTriangle'
            ];
            const fallback = (props) => <span style={{fontSize: '10px'}}>■</span>;
            const result = {};
            names.forEach(name => { result[name] = icons[name] || fallback; });
            return result;
        };

        const { 
            Sword, Shield, Heart, Zap, Skull, Sparkles, Eye, Flame, Crown, 
            BookOpen, Compass, ChevronRight, X, RefreshCw, Lock, Check, 
            Droplet, Wind, Activity, AlertTriangle 
        } = getIcons();

        // [데이터] 원본 로직 유지
        const PALETTE = {
            bg: '#0a0608', bgDeep: '#050304', panel: '#1a0e12', panelBorder: '#3d1f28',
            accent: '#c4453d', derod: '#d4a574', deblan: '#5c4a8c', text: '#e8d9c4', textDim: '#9b8975',
            ice: '#7ba3c4', blood: '#8b1f1f', green: '#7a9a5e', legendary: '#e8b04a'
        };

        const CLASSES = [
            { id: 'lanthert', name: '방랑검사', stats: { 근력: 16, 민첩: 15, 지능: 14 }, color: '#c4453d', skills: ['참격', '수비'] }
        ];

        const ENEMIES = {
            wraith: { name: '극지의 망령', hp: 250, color: '#7ba3c4', dmg: [15, 25] }
        };

        // [컴포넌트]
        function CombatGame() {
            const [player, setPlayer] = useState({ hp: 300, maxHp: 300, defense: 0 });
            const [enemy, setEnemy] = useState({ hp: 250, maxHp: 250, name: '극지의 망령' });
            const [log, setLog] = useState(['━━ 전투 시작 ━━']);
            const [isPlayerTurn, setIsPlayerTurn] = useState(true);

            // 로딩 화면 제거
            useEffect(() => {
                const loader = document.getElementById('loading');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }
            }, []);

            const attack = () => {
                if (!isPlayerTurn) return;
                const dmg = Math.floor(20 + Math.random() * 15);
                setEnemy(prev => ({ ...prev, hp: Math.max(0, prev.hp - dmg) }));
                setLog(prev => [`▸ 플레이어의 공격: ${dmg} 데미지`, ...prev.slice(0, 5)]);
                
                setIsPlayerTurn(false);
                setTimeout(enemyTurn, 800);
            };

            const enemyTurn = () => {
                const dmg = Math.floor(15 + Math.random() * 10);
                setPlayer(prev => ({ ...prev, hp: Math.max(0, prev.hp - dmg) }));
                setLog(prev => [`◂ 적의 반격: ${dmg} 데미지`, ...prev.slice(0, 5)]);
                setIsPlayerTurn(true);
            };

            return (
                <div className="relative w-[375px] h-[700px] bg-[#0a0608] border-[8px] border-[#1a0e12] rounded-[40px] overflow-hidden flex flex-col">
                    <div className="p-4 border-b border-[#3d1f28] flex justify-between text-[10px] uppercase text-[#c4453d] font-bold">
                        <span>Combat Demo</span>
                        <span>{isPlayerTurn ? 'Your Turn' : 'Enemy Turn'}</span>
                    </div>

                    <div className="p-6 bg-gradient-to-b from-[#1a0e12] to-transparent">
                        <div className="flex justify-between text-xs mb-2">
                            <span className="text-[#7ba3c4] font-bold">{enemy.name}</span>
                            <span>{enemy.hp}/{enemy.maxHp}</span>
                        </div>
                        <div className="h-1 bg-black overflow-hidden">
                            <div className="h-full bg-[#7ba3c4] transition-all duration-500" style={{ width: `${(enemy.hp/enemy.maxHp)*100}%` }} />
                        </div>
                    </div>

                    <div className="flex-1 px-6 py-4 space-y-2 overflow-hidden">
                        {log.map((line, i) => (
                            <div key={i} className="text-[11px] text-gray-400 animate-fadeIn">{line}</div>
                        ))}
                    </div>

                    <div className="p-6 border-t border-[#3d1f28] bg-[#0a0608]">
                        <div className="flex justify-between text-xs mb-2">
                            <span className="text-[#c4453d] font-bold">방랑검사</span>
                            <span>{player.hp}/{player.maxHp}</span>
                        </div>
                        <div className="h-1 bg-black mb-6">
                            <div className="h-full bg-green-700 transition-all duration-500" style={{ width: `${(player.hp/player.maxHp)*100}%` }} />
                        </div>
                        
                        <div className="grid grid-cols-2 gap-3">
                            <button onClick={attack} disabled={!isPlayerTurn || enemy.hp <= 0} className="py-3 border border-[#3d1f28] text-[11px] font-bold active:bg-[#c4453d]20 disabled:opacity-30">
                                <Sword size={12} className="inline mr-1" /> ATTACK
                            </button>
                            <button className="py-3 border border-[#3d1f28] text-[11px] font-bold opacity-30">
                                <Shield size={12} className="inline mr-1" /> DEFEND
                            </button>
                        </div>
                        
                        {(enemy.hp <= 0 || player.hp <= 0) && (
                            <button onClick={() => location.reload()} className="w-full mt-4 py-2 bg-[#c4453d] text-black text-[11px] font-bold">전투 재시작</button>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CombatGame />);
    </script>
</body>
</html>
