        const COMBAT_SKILLS = {

            관통: { name: '관통', cost: 1, cd: 2, type: 'physical', baseDmg: [30, 38], desc: '방어 무시 공격', pierce: true, icon: '↯' },

            정념폭발: { name: '정념폭발', cost: 2, cd: 3, type: 'magic', baseDmg: [40, 50], desc: '광역 마법 데미지', icon: '✺' },
            결계: { name: '결계', cost: 1, cd: 0, type: 'defense', defense: 40, desc: '방어 +40, 다음 턴 마법뎀+', icon: '◇' },
            광폭참격: { name: '광폭참격', cost: 0, cd: 0, type: 'physical', baseDmg: [20, 28], desc: 'HP 낮을수록 강해짐', berserker: true, icon: '⚔' },
            '피의 일격': { name: '피의 일격', cost: 1, cd: 2, type: 'physical', baseDmg: [25, 32], desc: '자신 HP -10, 적 출혈', selfDmg: 10, forceBleed: true, icon: '◆' },
            광기: { name: '광기', cost: 0, cd: 4, type: 'buff', buff: 'rage', desc: '3턴간 데미지 +30%', icon: '☩' },

            연속화살: { name: '연속화살', cost: 1, cd: 2, type: 'physical', baseDmg: [12, 16], hitCount: 3, desc: '3연발 공격', icon: '⤳' },
            바람결계: { name: '바람결계', cost: 1, cd: 0, type: 'defense', defense: 25, desc: '방어 +25, 회피 +20%', dodgeBuff: 20, icon: '◯' },

        const ENEMIES = {
            goblin: { name: '북부 고블린', hp: 60, color: '#7a9a5e', desc: '얼어붙은 동굴의 약탈자', patterns: [{ name: '단검 찌르기', dmg: [8, 12], type: 'attack' }, { name: '독 뿌리기', dmg: [4, 6], type: 'attack', applyDebuff: 'poison' }, { name: '도망 자세', dmg: [0, 0], type: 'defend', defense: 15 }] },
            wraith: { name: '극지의 망령', hp: 250, color: '#7ba3c4', desc: '얼음 속에 잠든 죽은 원정대의 영혼', isBoss: true, patterns: [{ name: '얼음 손길', dmg: [18, 24], type: 'attack' }, { name: '저주의 속삭임', dmg: [8, 12], type: 'attack', applyDebuff: 'curse' }, { name: '한기의 폭풍', dmg: [25, 35], type: 'attack', heavy: true }, { name: '망령의 가호', dmg: [0, 0], type: 'defend', defense: 30 }] },
            cultist: { name: '마족 첩자', hp: 80, color: '#8b1f1f', desc: '나크젤리온을 섬기는 광신도', patterns: [{ name: '저주받은 칼', dmg: [12, 18], type: 'attack' }, { name: '피의 의식', dmg: [16, 22], type: 'attack', heavy: true }, { name: '암흑 결계', dmg: [0, 0], type: 'defend', defense: 25 }] },

        // ============================================
        // 로직 함수들
        // ============================================
        function getActivePassives(skills, triggerType) {
            const active = [];
            Object.entries(skills).forEach(([name, lv]) => {
                if (lv === 0 || !PASSIVE_SKILLS[name]) return;
                Object.entries(PASSIVE_SKILLS[name].tiers).forEach(([tierLv, tierData]) => {
                    if (lv >= Number(tierLv) && tierData.trigger === triggerType) {
                        active.push({ skillName: name, tierLv: Number(tierLv), ...tierData });
                    }
                });
            });
            return active;
        }

        function hasEffect(skills, effectName) {
            const triggers = ['passive', 'onCombatStart', 'onAttack', 'onTurnStart', 'onDodge', 'onLethal'];
            return triggers.some(t => getActivePassives(skills, t).some(p => p.effect === effectName));
        }

        function calculateDamage(skill, attacker, defender, skills, isCrit) {
            if (skill.type === 'defense' || skill.type === 'buff') return 0;
            let base = Math.floor(skill.baseDmg[0] + Math.random() * (skill.baseDmg[1] - skill.baseDmg[0]));
            let dmg = base;
            let breakdown = [`기본 ${base}`];

            if (skill.type === 'physical') {
                const strBonus = Math.floor((attacker.근력 - 10) * 0.5);
                dmg += strBonus; if (strBonus > 0) breakdown.push(`근력 +${strBonus}`);
            } else if (skill.type === 'magic') {
                const intBonus = Math.floor((attacker.지능 - 10) * 0.7);
                dmg += intBonus; if (intBonus > 0) breakdown.push(`지능 +${intBonus}`);
            }
            if (skill.berserker) {
                const berserkBonus = Math.floor(dmg * (1 - attacker.hp / attacker.maxHp) * 0.5);
                dmg += berserkBonus; if (berserkBonus > 0) breakdown.push(`광폭 +${berserkBonus}`);
            }
            if (attacker.buffs?.rage > 0) {
                const rageBonus = Math.floor(dmg * 0.3);
                dmg += rageBonus; breakdown.push(`분노 +${rageBonus}`);
            }
            if (skill.type === 'magic' && hasEffect(skills, 'magicDmg+25')) {
                const magicBonus = Math.floor(dmg * 0.25);
                dmg += magicBonus; breakdown.push(`마력 Lv.3 +${magicBonus}`);
            }
            if (isCrit) {
                let mult = hasEffect(skills, 'critDmg+30') ? 1.8 : 1.5;
                dmg = Math.floor(dmg * mult); breakdown.push(`치명타 ×${mult}`);
            }
            let mitigated = 0;
            const pierces = skill.pierce || hasEffect(skills, 'pierceArmor');
            if (defender.defense > 0 && !pierces && skill.type !== 'magic') {
                mitigated = Math.min(defender.defense, dmg);
                dmg -= mitigated;
            }
            return { finalDmg: Math.max(0, dmg), mitigated, breakdown, isCrit };
        }

        function rollCrit(skills, attacker) {
            let rate = 5 + Math.max(0, (attacker.민첩 - 10) * 0.5);
            if (hasEffect(skills, 'crit+15')) rate += 15;
            return Math.random() * 100 < rate;
        }

        function rollDodge(skills, defender) {
            let rate = Math.max(0, (defender.민첩 - 10) * 0.3);
            if (hasEffect(skills, 'dodge+15')) rate += 15;
            if (defender.buffs?.dodgeBuff > 0) rate += defender.buffs.dodgeBuff;
            return Math.random() * 100 < rate;
        }

        // ============================================
        // UI 컴포넌트
        // ============================================
        function PhoneFrame({ children }) {
            return (
                <div className="relative mx-auto" style={{
                    width: '375px', height: '780px',

                    borderRadius: '36px',

                    boxShadow: '0 30px 80px rgba(0,0,0,0.6)',
                    overflow: 'hidden',
                    position: 'relative'
                }}>
                    <div className="absolute inset-0 pointer-events-none opacity-25" style={{
                        backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")`,
                        mixBlendMode: 'overlay',
                    }} />
                    {children}

            );
        }

        function CombatScreen({ classData, initialPlayer, initialSkills, enemyKey, onVictory, onDefeat }) {
            const [player, setPlayer] = useState(() => ({ ...initialPlayer, defense: 0, buffs: {}, debuffs: {}, cooldowns: {}, ether: 3, maxEther: 3, firstHitImmune: false, revivedThisCombat: false }));
            const [enemy, setEnemy] = useState(() => {
                const e = ENEMIES[enemyKey];
                return { ...e, key: enemyKey, currentHp: e.hp, maxHp: e.hp, defense: 0, debuffs: {}, nextIntent: null };
            });
            const [skills] = useState(initialSkills);
            const [turn, setTurn] = useState(1);
            const [phase, setPhase] = useState('intro');
            const [log, setLog] = useState([]);
            const [animDmg, setAnimDmg] = useState({ player: null, enemy: null });
            const logEndRef = useRef(null);

            useEffect(() => { logEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [log]);

            useEffect(() => {
                const initialLog = [{ type: 'narrative', text: `━━ ${enemy.name}이(가) 나타났다 ━━` }, { type: 'narrative', text: `「${enemy.desc}」` }];
                const newPlayer = { ...player };
                if (hasEffect(skills, 'startDefense+20')) { newPlayer.defense += 20; initialLog.push({ type: 'passive', text: `◆ [수비 Lv.3] 시작 방어 +20` }); }
                if (hasEffect(skills, 'heal20%')) { const heal = Math.floor(newPlayer.maxHp * 0.2); newPlayer.hp = Math.min(newPlayer.maxHp, newPlayer.hp + heal); initialLog.push({ type: 'passive', text: `◆ [재생 Lv.5] HP ${heal} 회복` }); }
                if (hasEffect(skills, 'firstHitImmune')) { newPlayer.firstHitImmune = true; initialLog.push({ type: 'passive', text: `◆ [회피 Lv.7] 첫 피격 무효 활성` }); }
                setPlayer(newPlayer); setLog(initialLog);
                setTimeout(() => { decideEnemyIntent(); setPhase('playerTurn'); }, 1500);
            }, []);

            const decideEnemyIntent = () => {
                const pattern = enemy.patterns[Math.floor(Math.random() * enemy.patterns.length)];
                setEnemy(prev => ({ ...prev, nextIntent: pattern }));
            };

            const handlePlayerAction = (skillKey) => {
                if (phase !== 'playerTurn') return;
                const skill = COMBAT_SKILLS[skillKey];
                let cost = skill.cost || 0;
                if (cost > 0 && hasEffect(skills, 'etherCost-20')) cost = Math.max(0, cost - 1);
                if (cost > player.ether || player.cooldowns[skillKey] > 0) return;

                const newLog = [...log, { type: 'player', text: `▸ ${skill.name}` }];
                let newPlayer = { ...player, ether: player.ether - cost };
                let newEnemy = { ...enemy };

                if (skill.selfDmg) { newPlayer.hp = Math.max(1, newPlayer.hp - skill.selfDmg); newLog.push({ type: 'system', text: `· 자신 HP -${skill.selfDmg}` }); }

                if (skill.type === 'physical' || skill.type === 'magic') {
                    const hitCount = skill.hitCount || 1;
                    let totalDmg = 0;
                    for (let i = 0; i < hitCount; i++) {
                        const isCrit = rollCrit(skills, newPlayer);
                        const res = calculateDamage(skill, newPlayer, newEnemy, skills, isCrit);
                        if (newEnemy.defense > 0 && !skill.pierce && skill.type !== 'magic') {
                            newEnemy.defense = Math.max(0, newEnemy.defense - res.mitigated);
                        }
                        newEnemy.currentHp = Math.max(0, newEnemy.currentHp - res.finalDmg);
                        totalDmg += res.finalDmg;
                        newLog.push({ type: 'damage', text: `· ${enemy.name}에게 ${res.finalDmg} 데미지${isCrit ? ' [치명타!]' : ''}${hitCount > 1 ? ` (${i+1}/${hitCount})` : ''}`, breakdown: res.breakdown.join(' / ') });
                        if (newEnemy.currentHp <= 0) break;
                    }
                    setAnimDmg({ player: null, enemy: totalDmg });
                    setTimeout(() => setAnimDmg({ player: null, enemy: null }), 800);

                    getActivePassives(skills, 'onAttack').forEach(p => {
                        if (p.effect === 'applyShock') { newEnemy.debuffs.shock = 1; newLog.push({ type: 'debuff', text: `◆ [${p.skillName}] 충격 부여` }); }
                        if (p.effect === 'applyBleed') { 
                            const stacks = hasEffect(skills, 'bleedStack') ? Math.min((newEnemy.debuffs.bleed || 0) + 1, 5) : 1;
                            newEnemy.debuffs = { ...newEnemy.debuffs, bleed: stacks, bleedTurns: 3 };
                            newLog.push({ type: 'debuff', text: `◆ [${p.skillName}] 출혈 ${stacks}중첩` });
                        }
                        if (p.effect === 'execute' && newEnemy.currentHp > 0 && newEnemy.currentHp <= newEnemy.maxHp * 0.2 && Math.random() < 0.15) {
                            newLog.push({ type: 'system', text: `◆ [잔혹 Lv.7] 즉사 발동!` }); newEnemy.currentHp = 0;
                        }
                    });
                    if (skill.forceBleed) { newEnemy.debuffs.bleed = (newEnemy.debuffs.bleed || 0) + 1; newEnemy.debuffs.bleedTurns = 3; }
                }

                if (skill.type === 'defense') {
                    newPlayer.defense += skill.defense; newLog.push({ type: 'system', text: `· 방어 게이지 +${skill.defense}` });
                    if (skill.dodgeBuff) { newPlayer.buffs.dodgeBuff = skill.dodgeBuff; newPlayer.buffs.dodgeBuffTurns = 1; }
                }
                if (skill.type === 'buff' && skill.buff === 'rage') { newPlayer.buffs.rage = 3; newLog.push({ type: 'system', text: `· 분노 발동! (3턴)` }); }
                if (skill.cd > 0) newPlayer.cooldowns[skillKey] = skill.cd;

                setPlayer(newPlayer); setEnemy(newEnemy); setLog(newLog);
                if (newEnemy.currentHp <= 0) { setTimeout(() => { setLog(p => [...p, { type: 'victory', text: `━━ ${enemy.name} 처치 ━━` }]); setPhase('victory'); }, 800); return; }
                setTimeout(() => { setPhase('enemyTurn'); executeEnemyTurn(newPlayer, newEnemy, newLog); }, 1000);
            };

            const executeEnemyTurn = (curP, curE, curL) => {
                const newLog = [...curL]; let newP = { ...curP }; let newE = { ...curE };
                if (newE.debuffs.shock > 0) { newLog.push({ type: 'debuff', text: `◆ ${enemy.name} 충격으로 행동 불가` }); newE.debuffs.shock = 0; setEnemy(newE); setLog(newLog); setTimeout(() => endTurn(newP, newE, newLog), 1200); return; }
                
                const intent = newE.nextIntent;
                newLog.push({ type: 'enemy', text: `◂ ${enemy.name}: ${intent.name}` });
                if (intent.type === 'attack') {
                    if (rollDodge(skills, newP)) { 
                        newLog.push({ type: 'system', text: `· 회피 성공!` });
                        if (hasEffect(skills, 'counterAttack') && Math.random() < 0.5) { const cDmg = 20; newE.currentHp = Math.max(0, newE.currentHp - cDmg); newLog.push({ type: 'damage', text: `◆ [회피 Lv.5] 반격 ${cDmg} 데미지` }); }
                    } else if (newP.firstHitImmune) { newLog.push({ type: 'passive', text: `◆ [회피 Lv.7] 첫 피격 무효!` }); newP.firstHitImmune = false; }
                    else {
                        let dmg = Math.floor(intent.dmg[0] + Math.random() * (intent.dmg[1] - intent.dmg[0]));
                        if (newP.defense > 0) { const abs = Math.min(newP.defense, dmg); newP.defense -= abs; dmg -= abs; }
                        if (hasEffect(skills, 'dmgTaken-15') && dmg > 0) dmg = Math.floor(dmg * 0.85);
                        if (newP.hp - dmg <= 0) {
                            if (hasEffect(skills, 'divineSave') && Math.random() < 0.3) { newLog.push({ type: 'passive', text: `◆ [신앙 Lv.5] 가호! 치명적 피격 회피` }); dmg = newP.hp - 1; }
                            else if (hasEffect(skills, 'revive') && !newP.revivedThisCombat) { newP.hp = Math.floor(newP.maxHp * 0.5); newP.revivedThisCombat = true; newLog.push({ type: 'passive', text: `◆ [재생 Lv.7] 부활!` }); dmg = 0; }
                        }
                        newP.hp = Math.max(0, newP.hp - dmg); newLog.push({ type: 'damageTaken', text: `· ${dmg} 데미지를 입었다` });
                        setAnimDmg({ player: dmg, enemy: null }); setTimeout(() => setAnimDmg({ player: null, enemy: null }), 800);
                    }
                } else if (intent.type === 'defend') { newE.defense += intent.defense; newLog.push({ type: 'system', text: `· 방어 자세 (+${intent.defense})` }); }

                setPlayer(newP); setEnemy(newE); setLog(newLog);
                if (newP.hp <= 0) { setTimeout(() => { setLog(p => [...p, { type: 'defeat', text: `━━ 패배 ━━` }]); setPhase('defeat'); }, 800); return; }
                setTimeout(() => endTurn(newP, newE, newLog), 1200);
            };

            const endTurn = (curP, curE, curL) => {
                const newLog = [...curL]; let newP = { ...curP }; let newE = { ...curE }; const nextTurn = turn + 1;
                if (newE.debuffs.bleed > 0) { const bDmg = newE.debuffs.bleed * 5; newE.currentHp = Math.max(0, newE.currentHp - bDmg); newE.debuffs.bleedTurns--; if (newE.debuffs.bleedTurns <= 0) newE.debuffs.bleed = 0; newLog.push({ type: 'debuff', text: `◆ 출혈 ${bDmg} 데미지` }); }
                Object.keys(newP.cooldowns).forEach(k => { if (newP.cooldowns[k] > 0) newP.cooldowns[k]--; });
                if (newP.buffs.rage > 0) newP.buffs.rage--;
                newP.ether = Math.min(newP.maxEther, newP.ether + 1);
                
                let extraTurn = false;
                getActivePassives(skills, 'onTurnStart').forEach(p => {
                    if (p.effect === 'regen10per4' && nextTurn % 4 === 0) { newP.hp = Math.min(newP.maxHp, newP.hp + 10); newLog.push({ type: 'passive', text: `◆ [재생] HP +10` }); }
                    if (p.effect === 'extraTurn' && nextTurn % p.interval === 0) extraTurn = true;
                });

                newP.defense = Math.floor(newP.defense * 0.5); newE.defense = Math.floor(newE.defense * 0.5);
                const nextPattern = newE.patterns[Math.floor(Math.random() * newE.patterns.length)];
                newE.nextIntent = nextPattern;

                setPlayer(newP); setEnemy(newE); setLog(newLog); setTurn(nextTurn);
                if (newE.currentHp <= 0) { setPhase('victory'); return; }
                if (extraTurn) { setTimeout(() => { setLog(p => [...p, { type: 'passive', text: `◆ 추가 턴 획득!` }]); setPhase('playerTurn'); }, 1000); }
                else setTimeout(() => setPhase('playerTurn'), 800);
            };

            return (
                <div className="absolute inset-0 flex flex-col" style={{ background: PALETTE.bgDeep }}>
                    <div className="px-4 py-2 border-b flex items-center justify-between" style={{ borderColor: PALETTE.panelBorder, background: PALETTE.panel }}>
                        <span className="text-[10px] tracking-[0.3em]" style={{ color: PALETTE.accent }}>━━ 전투 ━━</span>
                        <span className="text-[10px] tabular-nums" style={{ color: PALETTE.derod }}>TURN {turn}</span>
                    </div>

                    <div className="px-3 py-2.5" style={{ background: `linear-gradient(180deg, ${enemy.color}25, transparent)`, borderBottom: `1px solid ${enemy.color}40` }}>
                        <div className="flex justify-between items-center mb-1">
                            <div><span className="text-xs font-bold" style={{ color: enemy.color }}>{enemy.name}</span> {enemy.isBoss && <span className="ml-1 text-[9px] px-1" style={{ background: PALETTE.legendary, color: PALETTE.bgDeep }}>BOSS</span>}</div>
                            <span className="text-[11px] tabular-nums">{enemy.currentHp}/{enemy.maxHp} {animDmg.enemy && <span className="ml-1 text-red-500">-{animDmg.enemy}</span>}</span>
                        </div>
                        <div className="h-1.5 relative mb-1.5" style={{ background: PALETTE.bgDeep }}>
                            <div className="absolute inset-y-0 left-0 transition-all" style={{ width: `${(enemy.currentHp/enemy.maxHp)*100}%`, background: `linear-gradient(90deg, ${PALETTE.blood}, ${enemy.color})` }} />
                        </div>
                        <div className="flex gap-1 flex-wrap">
                            {enemy.defense > 0 && <span className="text-[9px] px-1.5 py-0.5 border" style={{ color: PALETTE.defense, borderColor: PALETTE.defense }}>◈ 방어 {enemy.defense}</span>}
                            {enemy.debuffs.bleed > 0 && <span className="text-[9px] px-1.5 py-0.5 border" style={{ color: PALETTE.bleed, borderColor: PALETTE.bleed }}>◆ 출혈 {enemy.debuffs.bleed}</span>}
                        </div>
                        {phase === 'playerTurn' && enemy.nextIntent && (
                            <div className="mt-1.5 px-2 py-1 flex items-center gap-2 border border-dashed" style={{ borderColor: enemy.color }}>
                                <AlertTriangle size={10} style={{ color: enemy.color }} />
                                <span className="text-[10px]">{enemy.nextIntent.name}</span>
                                <span className="text-[10px] ml-auto">{enemy.nextIntent.dmg[0]}-{enemy.nextIntent.dmg[1]}</span>
                            </div>
                        )}
                    </div>

                    <div className="flex-1 overflow-y-auto px-3 py-2 space-y-1.5 bg-[#060306]">
                        {log.map((e, i) => (
                            <div key={i} className="text-[11px]" style={{ color: e.type === 'player' ? PALETTE.green : e.type === 'enemy' ? PALETTE.accent : e.type === 'passive' ? PALETTE.derod : PALETTE.text }}>
                                {e.text} {e.breakdown && <div className="text-[9px] opacity-50 ml-3">({e.breakdown})</div>}
                            </div>
                        ))}
                        <div ref={logEndRef} />
                    </div>

                    <div className="px-3 py-2 border-t" style={{ borderColor: PALETTE.panelBorder, background: `${classData.color}10` }}>
                        <div className="flex justify-between items-center mb-1">
                            <span className="text-xs font-bold" style={{ color: classData.color }}>{classData.name}</span>
                            <span className="text-[11px]">{player.hp}/{player.maxHp} {animDmg.player && <span className="text-red-500">-{animDmg.player}</span>}</span>
                        </div>
                        <div className="h-1.5 relative mb-1.5" style={{ background: PALETTE.bgDeep }}>
                            <div className="absolute inset-y-0 left-0 transition-all" style={{ width: `${(player.hp/player.maxHp)*100}%`, background: `linear-gradient(90deg, ${PALETTE.blood}, ${PALETTE.green})` }} />
                        </div>
                        <div className="flex gap-1">
                            <span className="text-[9px] px-1.5 py-0.5 border" style={{ color: PALETTE.deblan, borderColor: PALETTE.deblan }}>✦ 에테르 {player.ether}</span>
                            {player.defense > 0 && <span className="text-[9px] px-1.5 py-0.5 border" style={{ color: PALETTE.defense, borderColor: PALETTE.defense }}>◈ 방어 {player.defense}</span>}
                        </div>
                    </div>

                    <div className="border-t p-2.5" style={{ borderColor: PALETTE.panelBorder, background: PALETTE.panel }}>
                        {phase === 'playerTurn' && (
                            <div className="grid grid-cols-3 gap-1.5">
                                {classData.combatSkills.map(sk => {
                                    const s = COMBAT_SKILLS[sk];
                                    const cd = player.cooldowns[sk] || 0;
                                    let c = s.cost || 0; if (c > 0 && hasEffect(skills, 'etherCost-20')) c = Math.max(0, c - 1);
                                    const disabled = cd > 0 || c > player.ether;
                                    return (
                                        <button key={sk} onClick={() => handlePlayerAction(sk)} disabled={disabled} className="py-2 border flex flex-col items-center opacity-100 disabled:opacity-30" style={{ borderColor: s.type === 'physical' ? PALETTE.accent : PALETTE.deblan }}>
                                            <span className="text-[11px] font-bold">{s.name}</span>
                                            <span className="text-[9px]">{cd > 0 ? `CD ${cd}` : `✦ ${c}`}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        )}
                        {phase === 'victory' && <button onClick={() => onVictory(player.hp)} className="w-full py-2.5 border" style={{ color: PALETTE.legendary, borderColor: PALETTE.legendary }}>보상 획득</button>}
                        {phase === 'defeat' && <button onClick={() => onDefeat()} className="w-full py-2.5 border" style={{ color: PALETTE.accent, borderColor: PALETTE.accent }}>다시 시작</button>}
                    </div>
                </div>
            );
        }

        const DEMO_PRESETS = [
            { id: 'fresh', name: '신규 캐릭터', classIdx: 0, skills: { 강타: 3, 심안: 2 }, hp: 300, maxHp: 300 },
            { id: 'maxed', name: '완성형 빌드', classIdx: 0, skills: { 강타: 7, 가속: 7, 회피: 7, 정밀: 5, 잔혹: 5 }, hp: 350, maxHp: 350 },
            { id: 'mage', name: '마법사 빌드', classIdx: 1, skills: { 마력: 7, 신앙: 5, 재생: 3 }, hp: 250, maxHp: 250 },
        ];

        function App() {
            const [pIdx, setPIdx] = useState(0);
            const [eKey, setEKey] = useState('goblin');
            const [cKey, setCKey] = useState(0);
            const preset = DEMO_PRESETS[pIdx];
            const classData = CLASSES[preset.classIdx];

            return (
                <div className="flex gap-8 items-start p-6 max-w-6xl">
                    <div className="hidden lg:block w-64">
                        <h1 className="text-3xl font-bold mb-4 text-[#c4453d] italic" style={{ fontFamily: 'Cinzel' }}>DEROD COMBAT</h1>
                        <p className="text-sm text-gray-400 mb-8">패시브 트리거 엔진 v0.3</p>
                        <div className="space-y-4">
                            {DEMO_PRESETS.map((p, i) => (
                                <button key={p.id} onClick={() => { setPIdx(i); setCKey(k => k + 1); }} className={`w-full text-left p-3 border transition-all ${pIdx === i ? 'bg-[#c4453d]20 border-[#c4453d]' : 'border-[#3d1f28]'}`}>
                                    <div className="text-xs font-bold">{p.name}</div>
                                </button>
                            ))}
                        </div>
                        <div className="mt-8 space-y-2">
                            {['goblin', 'cultist', 'wraith'].map(k => (
                                <button key={k} onClick={() => { setEKey(k); setCKey(k => k + 1); }} className={`w-full text-left p-2 text-[10px] border ${eKey === k ? 'border-[#d4a574]' : 'border-[#3d1f28]'}`}>
                                    {ENEMIES[k].name}
                                </button>
                            ))}
                        </div>
                    </div>

                    <PhoneFrame key={cKey}>
                        <CombatScreen 
                            classData={classData} 
                            initialPlayer={{ hp: preset.hp, maxHp: preset.maxHp, ...classData.stats }} 
                            initialSkills={preset.skills} 
                            enemyKey={eKey} 
                            onVictory={() => alert('승리!')} 
                            onDefeat={() => setCKey(k => k + 1)} 
                        />
                    </PhoneFrame>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
