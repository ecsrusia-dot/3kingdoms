<style>
  /* === 등급/속성 컬러 === */
  .grade-UR { color: #f43f5e; text-shadow: 0 0 8px rgba(244,63,94,0.7); font-weight: 900; }
  .grade-SSR { color: #fbbf24; text-shadow: 0 0 6px rgba(251,191,36,0.6); }
  .grade-SR { color: #c084fc; font-weight: bold; }
  .grade-R { color: #60a5fa; }
  .grade-N { color: #9ca3af; }
  .attr-天 { color: #38bdf8; text-shadow: 0 0 5px #0ea5e9; font-weight: 900; }
  .attr-地 { color: #34d399; text-shadow: 0 0 5px #10b981; font-weight: 900; }
  .attr-人 { color: #fb7185; text-shadow: 0 0 5px #f43f5e; font-weight: 900; }
  .hp-bar { transition: width 0.3s ease-out; }

  /* === 스크롤바 === */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar { width: 4px; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #64748b; border-radius: 4px; }

  /* === 전투 이펙트 애니메이션 === */
  @keyframes floatDamage {
    0% { opacity: 1; transform: translateY(0) scale(1.5); }
    100% { opacity: 0; transform: translateY(-30px) scale(1); }
  }
  .fx-dmg {
    position: absolute; pointer-events: none; z-index: 9999;
    animation: floatDamage 0.8s ease-out forwards;
    font-weight: 900; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
  }
  @keyframes skillCutin {
    0% { transform: scale(1.2) translateX(-100%); opacity: 0; }
    15% { transform: scale(1) translateX(0); opacity: 1; }
    85% { transform: scale(1) translateX(0); opacity: 1; }
    100% { transform: scale(0.8) translateX(100%); opacity: 0; }
  }
  .fx-skill {
    position: fixed; top: 40%; left: 0; right: 0; pointer-events: none; z-index: 9998;
    background: linear-gradient(90deg, transparent, rgba(245, 158, 11, 0.9), transparent);
    padding: 12px 0; text-align: center; font-size: 24px; font-weight: 900; color: white;
    text-shadow: 0 0 10px #f59e0b;
    animation: skillCutin 1.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
  }
  @keyframes screenFlash {
    0% { box-shadow: inset 0 0 150px rgba(255,255,255,0.8); }
    100% { box-shadow: inset 0 0 0 transparent; }
  }
  .flash-active { animation: screenFlash 0.4s ease-out; }
  @keyframes earthquake {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    20% { transform: translate(-5px, 5px) rotate(-2deg); }
    40% { transform: translate(5px, -5px) rotate(2deg); }
    60% { transform: translate(-5px, -5px) rotate(-1deg); }
    80% { transform: translate(5px, 5px) rotate(1deg); }
  }
  .shake-active { animation: earthquake 0.3s infinite; }

  /* === 가챠 풀스크린 이펙트 === */
  @keyframes gachaFxIn {
    0% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.1); }
    100% { opacity: 1; transform: scale(1); }
  }
  .fx-ur {
    background: radial-gradient(circle at center, rgba(244,63,94,0.4), rgba(0,0,0,0.95) 70%);
    animation: gachaFxIn 0.8s ease-out;
  }
  .fx-ssr {
    background: radial-gradient(circle at center, rgba(251,191,36,0.35), rgba(0,0,0,0.95) 70%);
    animation: gachaFxIn 0.8s ease-out;
  }
  @keyframes textGlow {
    0%, 100% { filter: drop-shadow(0 0 10px currentColor); }
    50% { filter: drop-shadow(0 0 25px currentColor); }
  }
  .fx-text-pulse { animation: textGlow 1.2s ease-in-out infinite; }

  /* === 환생 제단 이펙트 === */
  @keyframes altarPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.4), inset 0 0 20px rgba(168, 85, 247, 0.2); }
    50% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.7), inset 0 0 30px rgba(168, 85, 247, 0.4); }
  }
  .altar-pulse { animation: altarPulse 2s ease-in-out infinite; }

  /* === 토스트 알림 === */
  @keyframes toastSlide {
    0% { opacity: 0; transform: translate(-50%, 20px); }
    15% { opacity: 1; transform: translate(-50%, 0); }
    85% { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, -20px); }
  }
  .toast {
    position: fixed; bottom: 90px; left: 50%; z-index: 100;
    animation: toastSlide 2.4s ease-out forwards;
    background: rgba(15,23,42,0.95); border: 1px solid #475569;
    padding: 10px 20px; border-radius: 8px; font-size: 12px; font-weight: bold;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  /* iOS safe area */
  .pb-safe { padding-bottom: max(0.5rem, env(safe-area-inset-bottom)); }
</style>

<body class="bg-slate-900 text-slate-300 font-sans select-none overflow-hidden fixed inset-0 flex flex-col">

<!-- ============= HEADER ============= -->
<header class="bg-slate-800 p-3 flex justify-between items-center border-b border-slate-700 shrink-0 z-10 shadow-md">

  <div class="flex gap-3 text-xs font-semibold">

  </div>
</header>

<!-- ============= MAIN ============= -->
<main id="main-content" class="flex-1 overflow-y-auto relative w-full flex flex-col items-center justify-center p-4">
  <button onclick="bootGame()" class="px-8 py-5 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl shadow-[0_0_20px_rgba(37,99,235,0.5)] active:scale-95 transition-transform text-lg animate-pulse">
    🚀 게임 엔진 가동
  </button>
  <p class="text-xs text-slate-500 mt-4">버튼을 눌러 게임을 시작하세요.</p>
</main>

<!-- ============= FOOTER (탭 메뉴) ============= -->
<footer class="bg-slate-800 flex justify-around p-2 border-t border-slate-700 shrink-0 text-[11px] font-bold pb-safe z-10 shadow-lg">

  <button onclick="switchTab('codex')" id="tab-codex" class="flex-1 py-3 text-center rounded hover:bg-slate-700 text-emerald-400 transition-colors">📖 도감</button>

function getImgUrl(seed) { return `https://api.dicebear.com/9.x/adventurer/svg?seed=${seed}&backgroundColor=0f172a`; }

// =========================================================
// [2] 저장 / 불러오기 (localStorage)
// =========================================================
function saveGame() {
  try {
    var saveData = {
      version: 2,
      timestamp: Date.now(),
      resources: state.player.resources,
      roster: state.player.roster,
      party: state.player.party,
      legacy: state.player.legacy,
      stats: state.player.stats
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
    return true;
  } catch (e) {
    console.error('저장 실패:', e);
    return false;
  }
}

function loadGame() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    var data = JSON.parse(raw);
    if (data.resources) state.player.resources = data.resources;
    if (data.roster) state.player.roster = data.roster;
    if (data.party) state.player.party = data.party;
    if (data.legacy) state.player.legacy = data.legacy;
    if (data.stats) state.player.stats = data.stats;
    return true;
  } catch (e) {
    console.error('불러오기 실패:', e);
    return false;
  }
}

function resetGame() {
  if (!confirm('정말 모든 데이터를 초기화하시겠습니까?\n(보유 무장, 재화, 가문 버프 모두 사라집니다)')) return;
  localStorage.removeItem(SAVE_KEY);
  state.player = {
    resources: { skyStones: 15000, tacticsManuals: 0, legacyPoints: 0 },
    roster: [],
    party: [null, null, null, null, null],
    legacy: { atkBonus: 0, defBonus: 0, hpBonus: 0, spdBonus: 0 },
    stats: { totalGacha: 0, totalRebirth: 0, battleWins: 0 }
  };
  updateUI();
  switchTab('gacha');
  showToast('🔄 게임 데이터가 초기화되었습니다', 'text-amber-400');
}

// =========================================================
// [3] 토스트 알림 / 부트
// =========================================================
function showToast(msg, colorClass) {
  var toast = document.createElement('div');
  toast.className = 'toast ' + (colorClass || 'text-white');
  toast.innerHTML = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2400);
}

function bootGame() {
  try {
    var loaded = loadGame();
    updateUI();
    switchTab(loaded ? 'barracks' : 'gacha');
    if (loaded) showToast('💾 저장된 데이터를 불러왔습니다', 'text-emerald-400');
  } catch (e) {
    alert("엔진 가동 실패: " + e.message);
  }
}

function updateUI() {
  document.getElementById('ui-skystone').innerText = state.player.resources.skyStones.toLocaleString();
  document.getElementById('ui-manual').innerText = state.player.resources.tacticsManuals.toLocaleString();
  document.getElementById('ui-legacy').innerText = state.player.resources.legacyPoints.toLocaleString();
}

function switchTab(tab) {
  state.activeTab = tab;
  if (state.battle.timer) {
    clearInterval(state.battle.timer);
    state.battle.timer = null;
    state.battle.isRunning = false;
  }

  ['barracks', 'battle', 'gacha', 'codex', 'legacy'].forEach(t => {
    var btn = document.getElementById('tab-' + t);
    if (btn) btn.classList.remove('bg-slate-700');
  });
  var activeBtn = document.getElementById('tab-' + tab);
  if (activeBtn) activeBtn.classList.add('bg-slate-700');

  var main = document.getElementById('main-content');
  if (!main) return;
  main.className = (tab === 'battle')
    ? "flex-1 overflow-hidden relative w-full flex flex-col bg-slate-900"
    : "flex-1 overflow-y-auto p-4 relative w-full flex flex-col bg-slate-900";

  if (tab === 'gacha') renderGacha(main);
  else if (tab === 'barracks') renderBarracks(main);
  else if (tab === 'battle') renderDungeonSelect(main);
  else if (tab === 'codex') renderCodex(main);
  else if (tab === 'legacy') renderLegacy(main);
}

    <div class="space-y-1 text-[10px]">

      1회 소환 <span class="text-sky-300 text-xs ml-2">💠 100</span>
    </button>
    <button onclick="doGacha(10)" class="w-full py-5 bg-gradient-to-r from-amber-900/40 to-amber-700/30 border-2 border-amber-500/50 rounded-xl font-bold text-lg text-white shadow-[0_0_15px_rgba(245,158,11,0.2)] active:scale-95 transition-transform">
      10회 소환 <span class="text-amber-300 text-sm ml-2">💠 1,000</span>
      <div class="text-[9px] font-normal text-amber-200/70 mt-1">SR 이상 1장 확정</div>
    </button>
  </div>

  <div class="text-center text-[10px] text-slate-500 mt-6">
    누적 등용 횟수: ${state.player.stats.totalGacha}회
  </div>`;
}

function doGacha(times) {
  var cost = times * 100;
  if (state.player.resources.skyStones < cost) {
    showToast('💠 천운석이 부족합니다!', 'text-red-400');
    return;
  }
  state.player.resources.skyStones -= cost;
  state.player.stats.totalGacha += times;

  var results = [];
  var highestGrade = 'N';
  var hasGuaranteedSR = false; // 10연차 SR 이상 확정

  for (var i = 0; i < times; i++) {
    var roll = Math.random() * 100;
    var grade;
    if (roll < 0.05) grade = 'UR';
    else if (roll < 1.05) grade = 'SSR';
    else if (roll < 11.05) grade = 'SR';
    else if (roll < 51.05) grade = 'R';
    else grade = 'N';

    // 10연차의 마지막 자리에 SR 이상 보장
    if (times === 10 && i === 9 && !hasGuaranteedSR) {
      if (grade === 'R' || grade === 'N') grade = 'SR';
    }
    if (grade === 'UR' || grade === 'SSR' || grade === 'SR') hasGuaranteedSR = true;

    if (GRADE_ORDER[grade] > GRADE_ORDER[highestGrade]) highestGrade = grade;

    var pool = HERO_DB.filter(h => h.grade === grade);
    if (pool.length === 0) pool = HERO_DB.filter(h => h.grade === 'N');
    var hero = pool[Math.floor(Math.random() * pool.length)];

    var existing = state.player.roster.find(r => r.id === hero.id);
    if (existing) {
      existing.count++;
      results.push({ ...hero, isDup: true, count: existing.count });
    } else {
      state.player.roster.push({ id: hero.id, count: 1 });
      results.push({ ...hero, isDup: false, count: 1 });
    }
  }

  saveGame();
  updateUI();

  if (highestGrade === 'UR' || highestGrade === 'SSR') {
    playGachaFX(highestGrade, results);
  } else {
    showGachaResults(results);
  }
  // 가챠 후 화면 갱신
  setTimeout(() => {
    if (state.activeTab === 'gacha') renderGacha(document.getElementById('main-content'));
  }, 100);
}

function playGachaFX(grade, results) {
  var fxScreen = document.getElementById('gacha-fx');
  var fxText = document.getElementById('fx-text');
  fxScreen.classList.remove('hidden');
  if (grade === 'UR') {
    fxScreen.className = 'fixed inset-0 z-[60] flex flex-col items-center justify-center pointer-events-none fx-ur';
    fxText.innerHTML = '<span class="text-red-500 text-4xl font-black">천기가 요동칩니다...!!</span>';
  } else {
    fxScreen.className = 'fixed inset-0 z-[60] flex flex-col items-center justify-center pointer-events-none fx-ssr';
    fxText.innerHTML = '<span class="text-amber-400 text-3xl font-bold">영웅의 기운이 느껴집니다!</span>';
  }
  setTimeout(() => {
    fxScreen.classList.add('hidden');
    showGachaResults(results);
  }, 2200);
}

function showGachaResults(results) {
  var html = '';
  results.forEach(r => {
    var border = r.grade === 'UR' ? 'border-red-500 bg-red-900/30'
              : r.grade === 'SSR' ? 'border-amber-500 bg-amber-900/30'
              : r.grade === 'SR' ? 'border-purple-500 bg-purple-900/20'
              : 'border-slate-700 bg-slate-800';
    var txt = r.isDup
      ? `<div class="text-[9px] mt-1 text-amber-400 font-bold">✨ +${r.count - 1} 돌파</div>`
      : '<div class="text-[10px] mt-1 text-green-400 font-bold">NEW!</div>';
    var attrChar = attrMap[r.attr] || '無';
    html += `<div class="border ${border} p-2 rounded-xl text-center shadow-lg relative overflow-hidden flex flex-col items-center">
      <span class="absolute top-1 left-1 text-[10px] bg-black/50 px-1 rounded attr-${attrChar}">${attrChar}</span>
      <img src="${getImgUrl(r.id)}" class="w-12 h-12 rounded-full border border-slate-600 mb-1 mt-2 bg-slate-900 shadow-inner" loading="lazy">
      <div class="font-bold text-xs grade-${r.grade}">${r.name}</div>
      <div class="text-[8px] text-slate-400">${r.grade}</div>
      ${txt}
    </div>`;
  });
  document.getElementById('gacha-result-list').innerHTML = html;
  document.getElementById('modal-gacha').classList.remove('hidden');
}

    </select>
    <select onchange="updateFilter('role', this.value)" class="bg-slate-800 text-[10px] p-1.5 border border-slate-600 rounded text-slate-300 flex-1 outline-none">
      <option value="ALL" ${state.filters.role === 'ALL' ? 'selected' : ''}>모든 직업</option>
      <option value="군주" ${state.filters.role === '군주' ? 'selected' : ''}>군주</option>
      <option value="맹장" ${state.filters.role === '맹장' ? 'selected' : ''}>맹장</option>
      <option value="호위" ${state.filters.role === '호위' ? 'selected' : ''}>호위</option>

    </select>
  </div>
  <div class="flex-1 overflow-y-auto space-y-2 pb-10 custom-scrollbar">`;

  var filteredRoster = state.player.roster.filter(r => {
    var d = HERO_DB.find(x => x.id === r.id);
    if (!d) return false;
    if (state.filters.grade !== 'ALL' && d.grade !== state.filters.grade) return false;
    if (state.filters.role !== 'ALL' && d.role !== state.filters.role) return false;

          ${dupBadge}

      </div>`;
    });
  }
  container.innerHTML = html + '</div>';

function addToParty(id) {
  var idx = state.player.party.indexOf(null);
  if (idx !== -1) {
    state.player.party[idx] = id;
    saveGame();
    renderBarracks(document.getElementById('main-content'));
  } else {
    showToast('진형이 가득 찼습니다 (5/5)', 'text-red-400');
  }
}
function removeFromParty(i) {
  state.player.party[i] = null;
  saveGame();
  renderBarracks(document.getElementById('main-content'));
}
function removeFromPartyByHero(id) {
  var idx = state.player.party.indexOf(id);
  if (idx !== -1) {
    state.player.party[idx] = null;

function legacyRow(key, label, val, color) {
  var max = 50;
  var pct = (val / max) * 100;
  var canUpgrade = state.player.resources.legacyPoints >= 5 && val < max;
  return `<div class="bg-slate-900/80 rounded-lg p-2 border border-slate-700">
    <div class="flex justify-between items-center mb-1">
      <span class="text-[11px]">${label}</span>
      <span class="font-bold text-${color}-400">+${val}%</span>
    </div>
    <div class="w-full bg-slate-800 h-1 rounded overflow-hidden mb-2">
      <div class="bg-${color}-400 h-full" style="width:${pct}%"></div>
    </div>
    <button onclick="upgradeLegacy('${key}')" class="w-full text-[9px] py-1 rounded ${canUpgrade ? 'bg-purple-900/50 border border-purple-500/50 text-purple-200 active:scale-95' : 'bg-slate-800 border border-slate-700 text-slate-500'} transition-colors">
      ${val >= max ? '최대' : '강화 (🕯️ 5)'}
    </button>
  </div>`;
}

function upgradeLegacy(key) {
  var max = 50;
  if (state.player.legacy[key] >= max) {
    showToast('이미 최대치에 도달했습니다', 'text-slate-400');
    return;
  }
  if (state.player.resources.legacyPoints < 5) {
    showToast('🕯️ 유언 조각이 부족합니다', 'text-red-400');
    return;
  }
  state.player.resources.legacyPoints -= 5;
  state.player.legacy[key] += 1;
  saveGame();
  updateUI();
  renderLegacy(document.getElementById('main-content'));
  showToast(`🏛️ 가문 비전이 +1% 강화되었습니다`, 'text-purple-300');
}

function rebirthOption(grade) {
  var rule = REBIRTH_RULES[grade];
  if (!rule) return '';

  // 파티에 편성된 무장은 환생 재료로 사용 불가 (count로 환생가능 수 산출 시 제외)
  var ownedCount = 0;
  state.player.roster.forEach(r => {
    var d = HERO_DB.find(h => h.id === r.id);
    if (!d || d.grade !== grade) return;
    var inParty = state.player.party.includes(r.id);
    // 파티에 있으면 1명만 빼고 환생 가능 (돌파 보존)
    var available = inParty ? Math.max(0, r.count - 1) : r.count;
    ownedCount += available;
  });

  var canRebirth = ownedCount >= rule.need;
  var nextGradeColor = rule.result === 'UR' ? 'red' : rule.result === 'SSR' ? 'amber' : rule.result === 'SR' ? 'purple' : 'blue';

  return `<div class="bg-slate-900/80 border border-slate-700 rounded-lg p-3">
    <div class="flex justify-between items-center mb-2">
      <div>
        <span class="grade-${grade} font-bold">${grade}</span>
        <span class="text-slate-500 mx-2">×${rule.need}</span>
        <span class="text-slate-300">→</span>
        <span class="grade-${rule.result} font-bold ml-2">${rule.result}</span>
      </div>
      <span class="text-[10px] text-slate-400">성공률 <span class="text-${nextGradeColor}-400 font-bold">${rule.prob}%</span></span>
    </div>
    <div class="flex justify-between items-center">
      <span class="text-[10px] text-slate-400">사용 가능: <span class="${canRebirth ? 'text-emerald-400' : 'text-slate-500'} font-bold">${ownedCount}</span> / ${rule.need}명</span>
      <button onclick="openRebirthModal('${grade}')" ${!canRebirth ? 'disabled' : ''} class="text-[10px] px-3 py-1.5 rounded font-bold ${canRebirth ? 'bg-purple-900/50 border border-purple-500/50 text-purple-200 active:scale-95' : 'bg-slate-800 border border-slate-700 text-slate-600 cursor-not-allowed'}">
        ⚱️ 환생 시도
      </button>
    </div>
  </div>`;
}

// 환생 모달: 어떤 무장을 제물로 바칠지 선택
var rebirthSelection = { sourceGrade: null, selected: [] };

function openRebirthModal(grade) {
  var rule = REBIRTH_RULES[grade];
  rebirthSelection = { sourceGrade: grade, selected: [] };
  renderRebirthModal();
  document.getElementById('modal-rebirth').classList.remove('hidden');
}

function renderRebirthModal() {
  var grade = rebirthSelection.sourceGrade;
  var rule = REBIRTH_RULES[grade];

  // 제물로 가능한 무장 목록 (파티 외, count > 0)
  var candidates = [];
  state.player.roster.forEach(r => {
    var d = HERO_DB.find(h => h.id === r.id);
    if (!d || d.grade !== grade) return;
    var inParty = state.player.party.includes(r.id);
    var available = inParty ? Math.max(0, r.count - 1) : r.count;
    if (available > 0) candidates.push({ ...d, available: available });
  });

  var selectedCount = rebirthSelection.selected.reduce((s, x) => s + x.qty, 0);
  var ready = selectedCount === rule.need;

  var html = `
  <div class="mb-3 p-3 bg-slate-900/60 rounded-lg border border-slate-700">
    <div class="text-[11px] text-slate-300 mb-1">제물 선택: <span class="text-purple-300 font-bold">${selectedCount} / ${rule.need}</span></div>
    <div class="text-[10px] text-slate-500">선택된 무장: ${rebirthSelection.selected.map(s => `${s.name}×${s.qty}`).join(', ') || '없음'}</div>
  </div>
  <div class="space-y-2 mb-3">`;

  if (candidates.length === 0) {
    html += '<div class="text-center text-slate-500 py-4 text-[11px]">가용한 무장이 없습니다.</div>';
  } else {
    candidates.forEach(c => {
      var sel = rebirthSelection.selected.find(s => s.id === c.id);
      var selQty = sel ? sel.qty : 0;
      var attrChar = attrMap[c.attr];
      html += `<div class="bg-slate-900/80 border border-slate-700 rounded-lg p-2 flex items-center justify-between gap-2">
        <div class="flex items-center gap-2 flex-1 min-w-0">
          <img src="${getImgUrl(c.id)}" class="w-9 h-9 rounded-full border border-slate-600 shrink-0">
          <div class="min-w-0">
            <div class="grade-${c.grade} font-bold text-xs truncate">${c.name} <span class="attr-${attrChar} text-[9px]">${attrChar}</span></div>
            <div class="text-[9px] text-slate-500">보유 ${c.available}명</div>
          </div>
        </div>
        <div class="flex items-center gap-1 shrink-0">
          <button onclick="rebirthAdjust('${c.id}', -1)" class="w-6 h-6 bg-slate-700 rounded text-slate-300 text-sm font-bold active:scale-95">-</button>
          <span class="w-6 text-center text-xs font-bold ${selQty > 0 ? 'text-purple-300' : 'text-slate-500'}">${selQty}</span>
          <button onclick="rebirthAdjust('${c.id}', 1)" class="w-6 h-6 bg-slate-700 rounded text-slate-300 text-sm font-bold active:scale-95">+</button>
        </div>
      </div>`;
    });
  }
  html += `</div>
  <button onclick="executeRebirth()" ${!ready ? 'disabled' : ''} class="w-full py-3 rounded-lg font-bold ${ready ? 'bg-purple-700 hover:bg-purple-600 text-white shadow-[0_0_15px_rgba(168,85,247,0.4)] active:scale-95' : 'bg-slate-800 text-slate-600 cursor-not-allowed'} transition-all">
    ⚱️ 환생 시도 (성공률 ${rule.prob}%)
  </button>`;

  document.getElementById('rebirth-content').innerHTML = html;
}

function rebirthAdjust(id, delta) {
  var grade = rebirthSelection.sourceGrade;
  var rule = REBIRTH_RULES[grade];
  var rosterEntry = state.player.roster.find(r => r.id === id);
  if (!rosterEntry) return;

  var inParty = state.player.party.includes(id);
  var maxAvailable = inParty ? Math.max(0, rosterEntry.count - 1) : rosterEntry.count;

  var sel = rebirthSelection.selected.find(s => s.id === id);
  var currentQty = sel ? sel.qty : 0;
  var newQty = Math.max(0, Math.min(maxAvailable, currentQty + delta));

  // 총합 제한
  var otherTotal = rebirthSelection.selected.filter(s => s.id !== id).reduce((s, x) => s + x.qty, 0);
  if (otherTotal + newQty > rule.need) newQty = rule.need - otherTotal;
  if (newQty < 0) newQty = 0;

  if (newQty === 0) {
    rebirthSelection.selected = rebirthSelection.selected.filter(s => s.id !== id);
  } else if (sel) {
    sel.qty = newQty;
  } else {
    var hero = HERO_DB.find(h => h.id === id);
    rebirthSelection.selected.push({ id: id, name: hero.name, qty: newQty });
  }
  renderRebirthModal();
}

function executeRebirth() {
  var grade = rebirthSelection.sourceGrade;
  var rule = REBIRTH_RULES[grade];
  var totalQty = rebirthSelection.selected.reduce((s, x) => s + x.qty, 0);
  if (totalQty !== rule.need) return;

  // 제물 소비
  rebirthSelection.selected.forEach(sel => {
    var rosterEntry = state.player.roster.find(r => r.id === sel.id);
    if (!rosterEntry) return;
    rosterEntry.count -= sel.qty;
  });
  // count가 0이면 로스터에서 제거 (단, 파티에 있으면 1로 유지 — 위에서 이미 -1 보호함)
  state.player.roster = state.player.roster.filter(r => r.count > 0);

  state.player.stats.totalRebirth++;

  var success = Math.random() * 100 < rule.prob;
  closeModal('modal-rebirth');

  if (success) {
    var pool = HERO_DB.filter(h => h.grade === rule.result);
    var newHero = pool[Math.floor(Math.random() * pool.length)];
    var existing = state.player.roster.find(r => r.id === newHero.id);
    if (existing) existing.count++;
    else state.player.roster.push({ id: newHero.id, count: 1 });

    saveGame();
    updateUI();
    showToast(`✨ 환생 성공! <span class="grade-${newHero.grade}">${newHero.name}</span> 등용!`, 'text-amber-300');
    // 결과 모달
    showGachaResults([{ ...newHero, isDup: !!existing, count: existing ? existing.count : 1 }]);
  } else {
    var legacyGain = rule.need * (GRADE_ORDER[grade] || 1);
    state.player.resources.legacyPoints += legacyGain;
    saveGame();
    updateUI();
    showToast(`🕯️ 환생 실패... 유언 조각 ${legacyGain}개 획득`, 'text-purple-400');
  }
  renderLegacy(document.getElementById('main-content'));
}

// 가문 영구 버프 적용 + 모든 스탯 산출
function getUnitStats(u) {
  var isMagic = (u.role === '모사' || u.role === '힐러');
  var legacy = state.player.legacy || { atkBonus: 0, defBonus: 0, hpBonus: 0, spdBonus: 0 };

  // 적 유닛은 가문 버프 안 받음
  var legacyAtk = u.side === 'ally' ? legacy.atkBonus / 100 : 0;
  var legacyDef = u.side === 'ally' ? legacy.defBonus / 100 : 0;
  var legacySpd = u.side === 'ally' ? legacy.spdBonus / 100 : 0;

  var baseAtk = (isMagic ? u.stats.int * 5 : u.stats.str * 5) * (1 + legacyAtk);
  var baseDef = u.stats.con * 2 * (1 + legacyDef);
  var baseMdef = ((u.stats.con * 1) + (u.stats.int * 1.5)) * (1 + legacyDef);
  var baseSpd = u.stats.spd * (1 + legacySpd);

  var crr = 10, eva = 5, probB = 0, cdm = 150;

  if (u.passiveSkill) {
    var pDesc = u.passiveSkill.desc;
    var m;
    if ((m = pDesc.match(/공격력\s*(\d+)%/))) baseAtk *= (1 + parseInt(m[1]) / 100);
    if ((m = pDesc.match(/방어력\s*(\d+)%/))) { baseDef *= (1 + parseInt(m[1]) / 100); baseMdef *= (1 + parseInt(m[1]) / 100); }
    if ((m = pDesc.match(/속도\s*(\d+)%/))) baseSpd *= (1 + parseInt(m[1]) / 100);
    if (pDesc.includes('지력')) { baseAtk *= 1.05; baseMdef *= 1.05; }
    if (pDesc.includes('무력')) { baseAtk *= 1.05; }
    if ((m = pDesc.match(/치명타 확률\s*(\d+)%/))) crr += parseInt(m[1]);
    if ((m = pDesc.match(/치명타 피해량?\s*(\d+)%/))) cdm += parseInt(m[1]);
    if ((m = pDesc.match(/회피율\s*(\d+)%/))) eva += parseInt(m[1]);
    if ((m = pDesc.match(/스킬 발동 확률\s*(\d+)%/))) probB += parseInt(m[1]);
  }

  var atkB = 0, defB = 0, spdB = 0;
  u.buffs.forEach(b => {
    if (b.type === 'atk') atkB += b.amount;
    if (b.type === 'def') defB += b.amount;
    if (b.type === 'spd') spdB += b.amount;
  });

  var baseProb = u.activeSkill ? u.activeSkill.prob : 30;

  return {
    atk: Math.floor(baseAtk * (1 + atkB)),
    def: Math.floor(baseDef * (1 + defB)),
    mdef: Math.floor(baseMdef * (1 + defB)),
    spd: Math.floor(baseSpd * (1 + spdB)),
    crr: crr, eva: eva, cdm: cdm, prob: baseProb + probB,
    atkBonus: atkB, defBonus: defB, spdBonus: spdB, isMagic: isMagic
  };
}

function renderDungeonSelect(container) {
  if (!state.player.party.some(id => id !== null)) {
    container.innerHTML = '<div class="text-center pt-20 text-slate-400 px-6">출전할 무장이 없습니다.<br><br>👉 <button onclick="switchTab(\'barracks\')" class="text-amber-400 underline">막사</button>에서 진형을 편성하거나<br>👉 <button onclick="switchTab(\'gacha\')" class="text-blue-400 underline">등용문</button>에서 무장을 영입하세요.</div>';
    return;
  }
  let html = `<div class="text-center mb-6 mt-4"><h2 class="text-2xl font-bold text-yellow-400 mb-2 drop-shadow-md">🗺️ 출정지 선택</h2><p class="text-xs text-slate-400">전투를 진행할 전장을 선택하세요.</p></div><div class="flex flex-col gap-3 max-w-sm mx-auto w-full px-4">`;

  DUNGEON_DB.forEach(d => {
    html += `<button onclick="startDungeon('${d.id}')" class="w-full p-4 bg-slate-800 border border-slate-600 rounded-xl hover:bg-slate-700 transition-colors flex justify-between items-center text-left shadow-lg active:scale-95">
      <div>
        <div class="font-bold text-amber-300 text-lg">${d.name}</div>
        <div class="text-xs text-slate-400">${d.desc}</div>
        <div class="text-[10px] text-slate-500 mt-1">보상: 💠${d.reward.sky} / 📜${d.reward.manual}</div>
      </div>
      <div class="text-2xl">⚔️</div>
    </button>`;
  });

}

function startDungeon(dungeonId) {
  var container = document.getElementById('main-content');
  var dungeon = DUNGEON_DB.find(d => d.id === dungeonId);
  if (!dungeon) return;

  state.battle.dungeonId = dungeonId;
  state.battle.logs = [`<span class='text-amber-300 font-bold'>[${dungeon.name}] 전투가 시작되었습니다!</span>`];

  // 가문 hp 보너스 적용
  var hpBonus = (state.player.legacy && state.player.legacy.hpBonus) ? state.player.legacy.hpBonus / 100 : 0;

  state.battle.ally = state.player.party.map((id, idx) => {
    if (!id) return null;
    var d = HERO_DB.find(h => h.id === id);
    if (!d) return null;
    var maxHp = Math.floor(d.stats.con * 50 * (1 + hpBonus));
    return { ...JSON.parse(JSON.stringify(d)), hp: maxHp, maxHp: maxHp, atb: 0, pos: idx, side: 'ally', buffs: [], cd: 0 };
  }).filter(u => u !== null);

  state.battle.enemy = dungeon.enemies.map((id, idx) => {
    var d = HERO_DB.find(h => h.id === id);
    var maxHp = d.stats.con * 50;
    return { ...JSON.parse(JSON.stringify(d)), hp: maxHp, maxHp: maxHp, atb: 0, pos: idx, side: 'enemy', buffs: [], cd: 0 };
  });

  state.battle.ally.concat(state.battle.enemy).forEach(u => {
    if (u.passiveSkill) addLog(`<span class='text-blue-300 text-[9px]'>[패시브] ${u.name} - ${u.passiveSkill.name} 활성화!</span>`);
  });

  renderBattleScreen(container);
  state.battle.isRunning = true;
  state.battle.timer = setInterval(battleTick, 100);
}

function playSkillCutin(unitName, skillName) {
  var fx = document.createElement('div');
  fx.className = 'fx-skill';
  fx.innerHTML = `<span class="text-white">${unitName}</span> <span class="text-amber-300 ml-2">${skillName}</span>`;
  document.body.appendChild(fx);
  document.body.classList.add('flash-active');
  setTimeout(() => document.body.classList.remove('flash-active'), 400);
  setTimeout(() => fx.remove(), 1500);
}

function showFloatingDamage(unit, text, isHeal) {
  var area = document.getElementById(unit.side + '-area');
  if (!area || area.children.length <= unit.pos) return;
  var el = area.children[unit.pos];
  var rect = el.getBoundingClientRect();

  var fx = document.createElement('div');
  fx.className = `fx-dmg ${isHeal ? 'text-green-400' : 'text-red-500'} text-xl`;
  var offsetX = (Math.random() - 0.5) * 30;
  fx.style.left = (rect.left + rect.width / 2 - 20 + offsetX) + 'px';
  fx.style.top = (rect.top + 10) + 'px';
  fx.innerHTML = text;
  document.body.appendChild(fx);

  el.classList.add('shake-active');
  setTimeout(() => el.classList.remove('shake-active'), 300);
  setTimeout(() => fx.remove(), 800);
}

function battleTick() {
  if (!state.battle.isRunning) return;
  try {
    var allUnits = state.battle.ally.concat(state.battle.enemy);
    var allyAlive = state.battle.ally.filter(u => u.hp > 0).length;
    var enemyAlive = state.battle.enemy.filter(u => u.hp > 0).length;

    if (allyAlive === 0 || enemyAlive === 0) {
      clearInterval(state.battle.timer);
      state.battle.timer = null;
      state.battle.isRunning = false;
      var won = allyAlive > 0;
      if (won) {
        var dungeon = DUNGEON_DB.find(d => d.id === state.battle.dungeonId);
        var reward = dungeon ? dungeon.reward : { sky: 100, manual: 20 };
        state.player.resources.skyStones += reward.sky;
        state.player.resources.tacticsManuals += reward.manual;
        state.player.stats.battleWins++;
        addLog(`<span class='text-amber-400 font-bold'>✨ 전투 승리! 💠+${reward.sky} 📜+${reward.manual} 획득!</span>`);
        saveGame();
        updateUI();
      } else {
        addLog("<span class='text-red-500 font-bold'>패배했습니다...</span>");
      }
      updateBattleUI();
      return;
    }

    allUnits.forEach(u => {
      if (u.hp > 0) u.atb += getUnitStats(u).spd * 0.5;
    });

    var activeUnit = allUnits.find(u => u.atb >= 1000);
    if (activeUnit) {
      executeTurn(activeUnit);
      activeUnit.atb = 0;
      activeUnit.buffs.forEach(b => b.turns--);
      activeUnit.buffs = activeUnit.buffs.filter(b => b.turns > 0);
      if (activeUnit.cd > 0) activeUnit.cd--;
    }
    updateBattleUI();
  } catch (e) {
    console.error("Battle Tick Error", e);
    clearInterval(state.battle.timer);
    state.battle.timer = null;
    state.battle.isRunning = false;
  }
}

function executeTurn(unit) {
  if (unit.buffs.some(b => b.type === 'stun')) {
    addLog(`<span class='grade-${unit.grade}'>${unit.name}</span>은(는) 기절하여 행동하지 못합니다.`);
    return;
  }
  var stats = getUnitStats(unit);
  var skill = unit.activeSkill;

  if (skill && unit.cd <= 0 && Math.random() * 100 < stats.prob) {
    playSkillCutin(unit.name, skill.name);
    executeSkill(unit);
    unit.cd = skill.cd || 3;
  } else {
    executeAttack(unit);
  }
}

// 상성 보너스 (양방향)
// 천 > 지 > 인 > 천
function getAttrBonus(attacker, target) {
  var a = attacker.attr, t = target.attr;
  // 상성: 천 > 인 > 지 > 천 (기획서 기준)
  // 천(하늘)은 인(사람)에 강함, 인은 지(땅)에 강함, 지는 천에 강함
  // 유리 상성: 1.5배
  if ((a === '천' && t === '인') || (a === '인' && t === '지') || (a === '지' && t === '천')) {
    return { mult: 1.5, type: 'good' };
  }
  // 불리 상성: 0.7배 (기존 0.33은 너무 가혹해서 완화)
  if ((a === '인' && t === '천') || (a === '지' && t === '인') || (a === '천' && t === '지')) {
    return { mult: 0.7, type: 'bad' };
  }
  return { mult: 1.0, type: 'normal' };
}

function dealDamage(attacker, target, multiplier, dmgType) {
  if (!target || target.hp <= 0) return;
  dmgType = dmgType || 'physical';

  var atkStats = getUnitStats(attacker);
  var defStats = getUnitStats(target);

  if (Math.random() * 100 < defStats.eva) {
    addLog(`<span class='text-gray-400'>${target.name}이(가) ${attacker.name}의 공격을 회피했습니다!</span>`);
    showFloatingDamage(target, '회피!', false);
    return;
  }

  var baseDmg = atkStats.atk * multiplier;
  var targetDef = (dmgType === 'magic') ? defStats.mdef : defStats.def;
  // 방어 감산 곡선 완화: 200 기준점으로 해서 격차 줄임
  var miti = 200 / (200 + targetDef);

  var attrInfo = getAttrBonus(attacker, target);

  var isCrit = Math.random() * 100 < atkStats.crr;
  if (isCrit) baseDmg *= (atkStats.cdm / 100);

  var finalDmg = Math.max(1, Math.floor(baseDmg * miti * attrInfo.mult));
  target.hp = Math.max(0, target.hp - finalDmg);

  var critStr = isCrit ? "<span class='text-red-500 font-bold'>[치명타!] </span>" : "";
  var typeStr = dmgType === 'magic' ? "<span class='text-blue-300'>마법</span>" : "<span class='text-red-400'>물리</span>";
  var attrStr = '';
  if (attrInfo.type === 'good') attrStr = " <span class='text-[9px] text-amber-400'>(상성 우위!)</span>";
  else if (attrInfo.type === 'bad') attrStr = " <span class='text-[9px] text-slate-500'>(상성 불리)</span>";

  addLog(`${critStr}<span class='grade-${attacker.grade} font-bold'>${attacker.name}</span> ▶ <span class='grade-${target.grade} font-bold'>${target.name}</span>에게 ${typeStr} <span class='text-white font-bold'>${finalDmg}</span> 피해!${attrStr}`);
  showFloatingDamage(target, `-${finalDmg}`, false);
}

function executeAttack(unit) {
  var targets = unit.side === 'ally' ? state.battle.enemy : state.battle.ally;
  var aliveTargets = targets.filter(t => t.hp > 0);
  if (aliveTargets.length === 0) return;
  var tauntTarget = aliveTargets.find(t => t.buffs.some(b => b.type === 'taunt'));
  var target = tauntTarget || aliveTargets[Math.floor(Math.random() * aliveTargets.length)];
  var dmgType = getUnitStats(unit).isMagic ? 'magic' : 'physical';
  dealDamage(unit, target, 1.0, dmgType);
}

function executeSkill(unit) {
  var enemies = unit.side === 'ally' ? state.battle.enemy : state.battle.ally;
  var allies = unit.side === 'ally' ? state.battle.ally : state.battle.enemy;
  var aliveEnemies = enemies.filter(t => t.hp > 0);
  var aliveAllies = allies.filter(t => t.hp > 0);
  if (aliveEnemies.length === 0) return;

  var tauntTarget = aliveEnemies.find(t => t.buffs.some(b => b.type === 'taunt'));
  var target = tauntTarget || aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];

  var skillName = unit.activeSkill.name;
  var desc = unit.activeSkill.desc;
  var dmgType = getUnitStats(unit).isMagic ? 'magic' : 'physical';

  addLog(`<span class='grade-${unit.grade} font-bold text-amber-300'>[스킬 발동] ${unit.name} - ${skillName}!!</span>`);

  var targetEnemies = [];
  var targetAllies = [];

  if (desc.includes('적 전체')) targetEnemies = aliveEnemies;
  else if (desc.includes('가장 체력 낮은 적') || desc.includes('체력 가장 낮은 적')) targetEnemies = [aliveEnemies.reduce((min, e) => (e.hp / e.maxHp < min.hp / min.maxHp) ? e : min, aliveEnemies[0])];
  else targetEnemies = [target];

  if (desc.includes('아군 전체')) targetAllies = aliveAllies;
  else if (desc.includes('가장 체력 낮은 아군') || desc.includes('최저 체력 아군')) targetAllies = [aliveAllies.reduce((min, a) => (a.hp / a.maxHp < min.hp / min.maxHp) ? a : min, aliveAllies[0])];
  else targetAllies = [unit];

  var multi = 1.5;
  var match = desc.match(/(\d+)%\s*(마법|물리)?\s*피해/);
  if (match) {
    multi = parseInt(match[1]) / 100;
    if (match[2] === '마법') dmgType = 'magic';
    else if (match[2] === '물리') dmgType = 'physical';
  }

  if (desc.includes('피해') || desc.includes('타격') || desc.includes('공격') || desc.includes('참격') || desc.includes('강타')) {
    targetEnemies.forEach(e => {
      dealDamage(unit, e, multi, dmgType);
      var applied = [];
      if (desc.includes('기절')) { e.buffs.push({ type: 'stun', amount: 0, turns: 1, name: '기절' }); applied.push('기절'); }
      if (desc.includes('화상')) { e.buffs.push({ type: 'burn', amount: 0, turns: 3, name: '화상' }); applied.push('화상'); }
      if (desc.includes('중독')) { e.buffs.push({ type: 'poison', amount: 0, turns: 3, name: '중독' }); applied.push('중독'); }
      if (desc.includes('방어 감소') || desc.includes('방어력 감소') || desc.match(/방어\s*\d*%?\s*감소/)) { e.buffs.push({ type: 'def', amount: -0.2, turns: 2, name: '방어감소' }); applied.push('방어력 감소'); }
      if (desc.includes('속도 감소') || desc.match(/속도\s*\d*%?\s*감소/)) { e.buffs.push({ type: 'spd', amount: -0.2, turns: 2, name: '속도감소' }); applied.push('속도 감소'); }
      if (desc.includes('공격 감소') || desc.includes('공격력 감소')) { e.buffs.push({ type: 'atk', amount: -0.2, turns: 2, name: '공격감소' }); applied.push('공격력 감소'); }
      if (applied.length > 0) addLog(`<span class='text-purple-400'>↳ [디버프] ${e.name}에게 ${applied.join(', ')} 부여!</span>`);
    });
  }

  if (desc.includes('회복') || desc.includes('치유')) {
    var healMulti = unit.role === '힐러' ? 2.5 : 0.5;
    targetAllies.forEach(a => {
      var heal = Math.floor(getUnitStats(unit).atk * healMulti);
      a.hp = Math.min(a.maxHp, a.hp + heal);
      showFloatingDamage(a, `+${heal}`, true);
      addLog(`<span class='text-green-400'>↳ [회복] ${a.name} 체력 ${heal} 회복!</span>`);
    });
  }

  targetAllies.forEach(a => {
    var applied = [];
    if (desc.match(/방어(력)?\s*\d+%?\s*(상승|증가)/) || desc.includes('방어 상승')) {
      a.buffs.push({ type: 'def', amount: 0.25, turns: 3, name: '방어상승' }); applied.push('방어력 상승');
    }
    if (desc.match(/공격(력)?\s*\d+%?\s*(상승|증가)/) || desc.includes('공격 상승')) {
      a.buffs.push({ type: 'atk', amount: 0.25, turns: 3, name: '공격상승' }); applied.push('공격력 상승');
    }
    if (desc.match(/속도\s*\d+%?\s*(상승|증가)/)) {
      a.buffs.push({ type: 'spd', amount: 0.2, turns: 3, name: '속도상승' }); applied.push('속도 상승');
    }
    if (applied.length > 0) addLog(`<span class='text-green-300'>↳ [버프] ${a.name}에게 ${applied.join(', ')} 부여!</span>`);
  });

  if (desc.includes('도발')) {
    unit.buffs.push({ type: 'taunt', amount: 0, turns: 2, name: '도발' });
    addLog(`<span class='text-yellow-400'>↳ [도발] ${unit.name}이(가) 적의 이목을 끕니다!</span>`);
  }
  if (desc.includes('체력 소모') || desc.includes('체력 깎고') || desc.includes('체력') && desc.includes('소모')) {
    var cost = Math.floor(unit.hp * 0.2);
    unit.hp = Math.max(1, unit.hp - cost);
    showFloatingDamage(unit, `-${cost}`, false);
    addLog(`<span class='text-purple-400'>↳ ${unit.name}이(가) 자신의 체력을 ${cost} 소모!</span>`);
  }
}

function addLog(msg) {
  state.battle.logs.unshift(msg);
  if (state.battle.logs.length > 50) state.battle.logs.pop();
  var logEl = document.getElementById('battle-logs');
  if (logEl) {
    logEl.innerHTML = state.battle.logs.map((l, i) =>
      `<div class="mb-1 pb-1 border-b border-slate-800/50 ${i === 0 ? 'opacity-100 font-bold text-white' : (i < 3 ? 'opacity-80' : 'opacity-40 text-[10px]')}">${l}</div>`
    ).join('');
  }
}

function renderBattleScreen(container) {
  container.innerHTML = `<div class="flex-1 flex flex-col p-2 h-full gap-1 relative overflow-hidden">
    <div class="flex justify-between items-center px-2 mb-1">
      <button onclick="switchTab('battle')" class="text-[10px] text-slate-400 hover:text-white">← 출정지</button>
      <span class="text-[10px] text-amber-300">⚔️ 전투 중</span>
    </div>
    <div id="enemy-area" class="flex justify-around items-end h-[33%] pb-2 relative z-10"></div>
    <div id="battle-logs" class="flex-1 bg-black/60 rounded-xl p-3 overflow-y-auto text-[11px] text-slate-300 border border-slate-700/50 shadow-inner custom-scrollbar relative z-20"></div>
    <div id="ally-area" class="flex justify-around items-start h-[33%] pt-2 relative z-10"></div>
  </div>`;
  updateBattleUI();
}

function updateBattleUI() {
  var enemyArea = document.getElementById('enemy-area');
  var allyArea = document.getElementById('ally-area');
  if (!enemyArea || !allyArea) return;

  var unitHtml = (u) => {
    var isDead = u.hp <= 0;
    var stats = getUnitStats(u);
    var hpPct = Math.max(0, (u.hp / u.maxHp) * 100);

    var colorAtk = stats.atkBonus > 0 ? 'text-green-400' : (stats.atkBonus < 0 ? 'text-red-400' : 'text-slate-200');
    var colorDef = stats.defBonus > 0 ? 'text-green-400' : (stats.defBonus < 0 ? 'text-red-400' : 'text-slate-200');
    var colorSpd = stats.spdBonus > 0 ? 'text-green-400' : (stats.spdBonus < 0 ? 'text-red-400' : 'text-slate-200');

    var buffIcons = u.buffs.map(b => {
      var icon = '✨';
      if (b.type === 'atk') icon = (b.amount > 0 ? '⚔️' : '🔻');
      if (b.type === 'def') icon = (b.amount > 0 ? '🛡️' : '🔻');
      if (b.type === 'spd') icon = (b.amount > 0 ? '💨' : '🐢');
      if (b.type === 'stun') icon = '😵';
      if (b.type === 'poison') icon = '☠️';
      if (b.type === 'burn') icon = '🔥';
      if (b.type === 'bleed') icon = '🩸';
      if (b.type === 'taunt') icon = '🎯';
      return `<span class="text-[8px] bg-slate-700 border border-slate-500 rounded px-0.5 mx-0.5" title="${b.name || b.type}">${icon}</span>`;
    }).join('');

    return `<div id="unit-${u.side}-${u.pos}" class="flex flex-col items-center w-[4.8rem] transition-opacity ${isDead ? 'opacity-30 grayscale' : ''} relative">
      <div class="h-3 text-[10px] mb-0.5 flex justify-center w-full flex-wrap">${buffIcons}</div>
      <div class="relative">
        <img src="${getImgUrl(u.id)}" class="w-12 h-12 rounded-full border-2 ${u.side === 'ally' ? 'border-sky-500' : 'border-red-500'} bg-slate-900 shadow-lg mb-1">
        <span class="absolute -top-1 -right-1 text-[8px] attr-${attrMap[u.attr]} bg-black/80 px-1 rounded-full border border-slate-600">${attrMap[u.attr]}</span>
      </div>
      <div class="text-[9px] mb-1 font-bold grade-${u.grade} w-full truncate text-center">${u.name}</div>
      <div class="w-full bg-slate-900 h-3.5 rounded-full overflow-hidden mb-1 border border-slate-700 relative shadow-inner">
        <div class="hp-bar bg-red-500 h-full" style="width:${hpPct}%"></div>
        <span class="absolute inset-0 flex items-center justify-center text-[8px] font-bold text-white drop-shadow-md">${Math.floor(u.hp)}/${Math.floor(u.maxHp)}</span>
      </div>
      <div class="w-full bg-slate-900 h-1 rounded-full overflow-hidden mb-1 border border-slate-700">
        <div class="bg-amber-400 h-full hp-bar" style="width: ${Math.min(100, (u.atb / 1000) * 100)}%"></div>
      </div>
      <div class="w-full mt-0.5 bg-slate-800/80 border border-slate-600 rounded p-1 text-[8px] leading-tight grid grid-cols-2 gap-x-1 gap-y-0.5 shadow-md text-left">
        <div class="flex justify-between text-slate-400"><span>공:</span><span class="font-bold ${colorAtk}">${stats.atk}</span></div>
        <div class="flex justify-between text-slate-400"><span>속:</span><span class="font-bold ${colorSpd}">${stats.spd}</span></div>
        <div class="flex justify-between text-slate-400"><span>물방:</span><span class="font-bold ${colorDef}">${stats.def}</span></div>
        <div class="flex justify-between text-slate-400"><span>마방:</span><span class="font-bold ${colorDef}">${stats.mdef}</span></div>
        <div class="flex justify-between text-slate-400"><span>치확:</span><span class="font-bold text-red-300">${stats.crr}%</span></div>
        <div class="flex justify-between text-slate-400"><span>회피:</span><span class="font-bold text-sky-300">${stats.eva}%</span></div>
      </div>
    </div>`;
  };

  enemyArea.innerHTML = state.battle.enemy.map(unitHtml).join('');
  allyArea.innerHTML = state.battle.ally.map(unitHtml).join('');
}

// =========================================================
// [9] 페이지 가시성 변경 시 안전 처리
// =========================================================
window.addEventListener('beforeunload', () => {
  if (state.battle.timer) clearInterval(state.battle.timer);
  saveGame();
});

</script>
</body>
